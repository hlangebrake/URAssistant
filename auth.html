<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="referrer" content="no-referrer">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; connect-src 'none'; img-src 'self' data:; font-src 'self'; media-src 'none'; object-src 'none'; base-uri 'none'; form-action 'none'; frame-src 'none'; child-src 'none'; worker-src 'self'; manifest-src 'self'">
  <meta name="theme-color" content="#f4efe4">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <title>Unterrichtsassistent Entsperren</title>
  <link rel="manifest" href="./manifest.webmanifest">
  <link rel="apple-touch-icon" sizes="180x180" href="./apple-touch-icon.png">
  <link rel="apple-touch-icon" sizes="167x167" href="./apple-touch-icon-167x167.png">
  <link rel="apple-touch-icon" sizes="152x152" href="./apple-touch-icon-152x152.png">
  <link rel="stylesheet" href="style.css?v=20260330e">
</head>
<body class="auth-page">
  <main class="auth-shell">
    <section class="auth-card" aria-labelledby="authTitle">
      <p class="auth-card__eyebrow">Unterrichtsassistent</p>
      <h1 class="auth-card__title" id="authTitle">App entsperren</h1>
      <p class="auth-card__text" id="authDescription">Die App ist geschuetzt. Bitte Passwort eingeben.</p>
      <form class="auth-form" id="authForm" autocomplete="on" method="post" action="about:blank" data-local-only-form>
        <input id="authUsername" name="username" type="text" value="" autocomplete="username" autocapitalize="none" spellcheck="false" class="auth-form__username" tabindex="-1" aria-hidden="true">
        <label class="auth-form__field" id="authPasswordField" for="authPassword">
          <span id="authPasswordLabel">Passwort</span>
          <input id="authPassword" name="password" type="password" autocomplete="current-password" autocapitalize="none" spellcheck="false" required>
        </label>
        <label class="auth-form__field" id="authConfirmField" for="authPasswordConfirm" hidden>
          <span>Passwort wiederholen</span>
          <input id="authPasswordConfirm" name="passwordConfirm" type="password" autocomplete="new-password" autocapitalize="none" spellcheck="false">
        </label>
        <p class="auth-form__error" id="authError" hidden></p>
        <button class="import-box__label auth-form__submit" id="authSubmitButton" type="submit">Entsperren</button>
      </form>
      <section class="auth-import" id="authImportSection" hidden>
        <div class="auth-import__divider"><span>oder</span></div>
        <p class="auth-import__text" id="authImportDescription">Ein vorhandener verschluesselter Export kann direkt uebernommen werden.</p>
        <div class="auth-import__meta" id="authImportMeta" hidden></div>
        <div class="auth-import__actions">
          <button class="import-box__label auth-import__button" id="authImportButton" type="button">Verschluesseltes Backup importieren</button>
          <button class="auth-import__cancel" id="authImportCancelButton" type="button" hidden>Import abbrechen</button>
        </div>
        <input id="authImportInput" type="file" accept=".json,application/json" hidden>
      </section>
    </section>
  </main>

  <script>
    (function () {
      if (!("serviceWorker" in navigator) || window.location.protocol === "file:") {
        return;
      }

      window.addEventListener("load", function () {
        navigator.serviceWorker.getRegistrations().then(function (registrations) {
          return Promise.all(
            registrations.map(function (registration) {
              return registration.unregister();
            })
          );
        }).then(function () {
          if (!("caches" in window)) {
            return Promise.resolve();
          }

          return caches.keys().then(function (cacheNames) {
            return Promise.all(
              cacheNames.map(function (cacheName) {
                return caches.delete(cacheName);
              })
            );
          });
        }).catch(function (error) {
          console.warn("Service Worker oder Cache konnten nicht entfernt werden.", error);
        });
      });
    }());
  </script>
  <script src="src/data/indexedDb.js?v=20260330a"></script>
  <script src="src/data/appRepository.js?v=20260330a"></script>
  <script src="src/security/passwordAuth.js?v=20260330a"></script>
  <script src="src/security/appDataCrypto.js?v=20260330a"></script>
  <script src="src/authPage.js?v=20260330a"></script>
</body>
</html>
