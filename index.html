<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Unterrichtsassistent</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="app-shell is-collapsed">
    <aside class="sidebar" id="sidebar">
      <div class="sidebar__top">
        <button class="sidebar__toggle" id="menuToggle" type="button" aria-label="Menueleiste ein- oder ausklappen" aria-expanded="false" aria-controls="sidebarNav" onclick="return window.UnterrichtsassistentApp.toggleMenu()">
          <span class="sidebar__toggle-icon" aria-hidden="true">&#9776;</span>
        </button>
        <div class="sidebar__brand">
          <button class="sidebar__brand-mark" id="activeClassBadge" type="button" aria-label="Aktive Lerngruppe auswaehlen" aria-haspopup="listbox" aria-expanded="false" onclick="return window.UnterrichtsassistentApp.toggleCollapsedClassPicker()">--</button>
          <button id="collapsedLiveDateTimeButton" class="sidebar__live-button sidebar__live-button--collapsed" type="button" aria-label="Live-Modus aktivieren" aria-pressed="true" onclick="return window.UnterrichtsassistentApp.setLiveDateTimeMode()"></button>
          <div class="sidebar__brand-text">
            <div class="sidebar__brand-row">
              <select id="activeClassSelect" class="sidebar__class-select" aria-label="Aktive Lerngruppe waehlen" onchange="return window.UnterrichtsassistentApp.changeActiveClass(this.value)">
                <option value="">Keine Lerngruppe</option>
              </select>
            </div>
            <div class="sidebar__brand-row sidebar__brand-row--datetime">
              <button id="liveDateTimeButton" class="sidebar__live-button" type="button" aria-pressed="true" onclick="return window.UnterrichtsassistentApp.setLiveDateTimeMode()"><span class="sidebar__live-button-text">Live</span></button>
              <div class="sidebar__datetime-stack">
                <label class="sidebar__field">
                  <input id="activeDateInput" class="sidebar__datetime-input" type="date" onchange="return window.UnterrichtsassistentApp.updateActiveDateTime('date', this.value)">
                </label>
                <label class="sidebar__field">
                  <input id="activeTimeInput" class="sidebar__datetime-input" type="time" onchange="return window.UnterrichtsassistentApp.updateActiveDateTime('time', this.value)">
                </label>
              </div>
            </div>
          </div>
          <div class="collapsed-class-picker" id="collapsedClassPicker" hidden></div>
        </div>
      </div>

      <nav class="sidebar__nav" id="sidebarNav" aria-label="Hauptnavigation">
        <button class="nav-link is-active" type="button" data-view-target="unterricht" data-view-title="Unterricht" onclick="window.UnterrichtsassistentApp.activateView('unterricht'); return false;">
          <span class="nav-link__icon" aria-hidden="true">U</span>
          <span class="nav-link__label">Unterricht</span>
        </button>
        <button class="nav-link" type="button" data-view-target="klasse" data-view-title="Lerngruppe" onclick="window.UnterrichtsassistentApp.activateView('klasse'); return false;">
          <span class="nav-link__icon" aria-hidden="true">L</span>
          <span class="nav-link__label">Lerngruppe</span>
        </button>
        <button class="nav-link" type="button" data-view-target="stundenplan" data-view-title="Stundenplan" onclick="window.UnterrichtsassistentApp.activateView('stundenplan'); return false;">
          <span class="nav-link__icon" aria-hidden="true">S</span>
          <span class="nav-link__label">Stundenplan</span>
        </button>
        <button class="nav-link" type="button" data-view-target="sitzplan" data-view-title="Sitzplan" onclick="window.UnterrichtsassistentApp.activateView('sitzplan'); return false;">
          <span class="nav-link__icon" aria-hidden="true">P</span>
          <span class="nav-link__label">Sitzplan</span>
        </button>
      </nav>
      <div class="sidebar__footer">
        <div class="sidebar__footer-actions">
          <button class="sidebar__storage-button sidebar__storage-button--secondary" id="exportButton" type="button" aria-label="App-Daten als JSON exportieren" title="App-Daten als JSON exportieren" onclick="return window.UnterrichtsassistentApp.exportAppData()">
            <span class="sidebar__storage-icon" aria-hidden="true">&#11123;</span>
            <span class="sidebar__storage-label">Export</span>
          </button>
          <button class="sidebar__storage-button sidebar__storage-button--secondary" id="importButton" type="button" aria-label="App-Daten aus JSON importieren" title="App-Daten aus JSON importieren" onclick="return window.UnterrichtsassistentApp.openImportAppData()">
            <span class="sidebar__storage-icon" aria-hidden="true">&#11121;</span>
            <span class="sidebar__storage-label">Import</span>
          </button>
          <button class="sidebar__storage-button" id="persistenceButton" type="button" aria-label="Daten manuell in IndexedDB speichern" title="Daten manuell in IndexedDB speichern" onclick="return window.UnterrichtsassistentApp.flushPersistence()">
            <span class="sidebar__storage-icon" aria-hidden="true">&#128190;</span>
            <span class="sidebar__storage-label">Speicher</span>
          </button>
        </div>
        <input id="appDataImportInput" type="file" accept=".json,application/json" hidden onchange="return window.UnterrichtsassistentApp.importAppDataFromFile(event)">
      </div>
    </aside>

    <main class="content" id="mainContent">
      <header class="content__header">
        <div class="content__title-row">
          <h1 id="viewTitle">Unterricht</h1>
          <div id="viewHeaderActions"></div>
        </div>
        <p class="content__subtitle" id="viewSubtitle" hidden></p>
      </header>

      <section class="view is-active" id="unterricht" data-view></section>
      <section class="view" id="klasse" data-view hidden></section>
      <section class="view" id="stundenplan" data-view hidden></section>
      <section class="view" id="sitzplan" data-view hidden></section>
    </main>
  </div>

  <script>
    (function () {
      var appShell = document.querySelector(".app-shell");
      var menuToggle = document.getElementById("menuToggle");
      var navLinks = document.querySelectorAll(".nav-link");
      var views = document.querySelectorAll("[data-view]");
      var viewTitle = document.getElementById("viewTitle");
      var viewHeaderActions = document.getElementById("viewHeaderActions");

      window.UnterrichtsassistentApp = window.UnterrichtsassistentApp || {};

      window.UnterrichtsassistentApp.activateView = function (viewId) {
        var i;
        var selectedLink = null;

        for (i = 0; i < navLinks.length; i += 1) {
          if (navLinks[i].getAttribute("data-view-target") === viewId) {
            navLinks[i].classList.add("is-active");
            navLinks[i].setAttribute("aria-current", "page");
            selectedLink = navLinks[i];
          } else {
            navLinks[i].classList.remove("is-active");
            navLinks[i].setAttribute("aria-current", "false");
          }
        }

        for (i = 0; i < views.length; i += 1) {
          if (views[i].id === viewId) {
            views[i].classList.add("is-active");
            views[i].hidden = false;
          } else {
            views[i].classList.remove("is-active");
            views[i].hidden = true;
          }
        }

        if (selectedLink) {
          viewTitle.textContent = selectedLink.getAttribute("data-view-title") || selectedLink.textContent;
          viewHeaderActions.innerHTML = viewId === "klasse"
            ? '<div class="header-action-group"><button class="circle-action circle-action--danger" type="button" aria-label="Aktive Lerngruppe loeschen" onclick="return window.UnterrichtsassistentApp.deleteActiveClass()">-</button><button class="circle-action" type="button" aria-label="Neue Lerngruppe anlegen" onclick="return window.UnterrichtsassistentApp.openClassImportModal()">+</button></div>'
            : "";
        }
      };

      window.UnterrichtsassistentApp.toggleMenu = function () {
        if (!appShell || !menuToggle) {
          return false;
        }

        if (appShell.classList.contains("is-collapsed")) {
          appShell.classList.remove("is-collapsed");
          menuToggle.setAttribute("aria-expanded", "true");
        } else {
          appShell.classList.add("is-collapsed");
          menuToggle.setAttribute("aria-expanded", "false");
        }

        return false;
      };

      window.UnterrichtsassistentApp.changeActiveClass = function () {
        return false;
      };
    }());
  </script>
  <script src="src/domain/models.js"></script>
  <script src="src/domain/factories.js"></script>
  <script src="src/data/demoData.js"></script>
  <script src="src/data/indexedDb.js"></script>
  <script src="src/data/appRepository.js"></script>
  <script src="src/data/studentCsvImport.js"></script>
  <script src="src/services/schoolService.js"></script>
  <script src="src/ui/views/unterrichtView.js"></script>
  <script src="src/ui/views/klasseView.js"></script>
  <script src="src/ui/views/stundenplanView.js"></script>
  <script src="src/ui/views/sitzplanView.js"></script>
  <script src="src/ui/viewRegistry.js"></script>
  <script src="src/ui/renderers.js"></script>
  <script src="src/app.js"></script>
</body>
</html>
