<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="referrer" content="no-referrer">
  <title>Unterrichtsassistent AllInOne</title>
  <style>
:root {
  --bg: #f4f1e8;
  --surface: #fbf8f1;
  --surface-strong: #efe7d6;
  --sidebar: #17313e;
  --sidebar-accent: #254c5d;
  --text: #1f2430;
  --text-soft: #5f6470;
  --text-on-dark: #f7f3eb;
  --line: rgba(23, 49, 62, 0.12);
  --highlight: #c76837;
  --shadow: 0 20px 60px rgba(23, 49, 62, 0.12);
  --sidebar-width: 280px;
  --sidebar-width-collapsed: 88px;
  --radius: 22px;
}

*,
*::before,
*::after {
  box-sizing: border-box;
}

html,
body {
  margin: 0;
  height: 100%;
  min-height: 100%;
  font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
  color: var(--text);
  background:
    radial-gradient(circle at top right, rgba(199, 104, 55, 0.18), transparent 28%),
    linear-gradient(180deg, #f7f1e6 0%, var(--bg) 100%);
}

html {
  -webkit-text-size-adjust: 100%;
  overflow: hidden;
  overscroll-behavior: none;
}

body {
  position: fixed;
  inset: 0;
  width: 100%;
  min-height: 100vh;
  min-height: 100dvh;
  overflow: hidden;
  overscroll-behavior: none;
}

body.auth-page {
  position: static;
  min-height: 100vh;
  min-height: 100dvh;
  overflow: auto;
}

button {
  font: inherit;
  -webkit-appearance: none;
  appearance: none;
  -webkit-tap-highlight-color: transparent;
  touch-action: manipulation;
  user-select: none;
}

.app-shell {
  display: grid;
  grid-template-columns: var(--sidebar-width) 1fr;
  height: 100vh;
  height: 100dvh;
  min-height: 100vh;
  min-height: 100dvh;
  overflow: hidden;
  transition: grid-template-columns 0.25s ease;
}

.app-shell.is-collapsed {
  grid-template-columns: var(--sidebar-width-collapsed) 1fr;
}

.sidebar {
  position: sticky;
  top: 0;
  z-index: 40;
  isolation: isolate;
  display: flex;
  flex-direction: column;
  gap: 1.75rem;
  height: 100vh;
  height: 100dvh;
  min-height: 0;
  overflow: auto;
  overscroll-behavior: contain;
  -webkit-overflow-scrolling: touch;
  padding: 1.25rem;
  padding-top: max(1.25rem, env(safe-area-inset-top));
  padding-left: max(1.25rem, env(safe-area-inset-left));
  padding-right: max(1.25rem, env(safe-area-inset-right));
  padding-bottom: max(1.25rem, env(safe-area-inset-bottom));
  background:
    linear-gradient(180deg, rgba(255, 255, 255, 0.08), transparent 24%),
    linear-gradient(180deg, var(--sidebar-accent) 0%, var(--sidebar) 100%);
  color: var(--text-on-dark);
}

.sidebar__top {
  display: grid;
  gap: 1rem;
  padding-bottom: 1rem;
  border-bottom: 1px solid rgba(255, 255, 255, 0.14);
}

.sidebar__toggle {
  display: inline-grid;
  place-items: center;
  width: 52px;
  min-height: 52px;
  padding: 0.75rem;
  margin: 0 auto;
  border: 1px solid rgba(255, 255, 255, 0.14);
  border-radius: 999px;
  background: rgba(255, 255, 255, 0.08);
  color: inherit;
  cursor: pointer;
}

.sidebar__brand {
  position: relative;
  display: grid;
  grid-template-columns: 48px minmax(0, 1fr);
  align-items: start;
  gap: 0.9rem;
}

.sidebar__brand-mark {
  display: grid;
  place-items: center;
  width: 56px;
  height: 56px;
  border: 0;
  border-radius: 16px;
  background: rgba(255, 255, 255, 0.14);
  color: var(--text-on-dark);
  font-weight: 700;
  font-size: 0.95rem;
  cursor: pointer;
}

.sidebar__brand-text {
  display: contents;
}

.sidebar__brand-row {
  display: flex;
  align-items: center;
  gap: 0.75rem;
  min-height: 56px;
}

.sidebar__brand-row:first-child {
  grid-column: 2;
  grid-row: 1;
}

.sidebar__brand-row--datetime {
  grid-column: 1 / -1;
  grid-row: 2;
  display: grid;
  grid-template-columns: 56px minmax(0, 1fr);
  align-items: center;
  gap: 0.75rem;
  margin-top: 0.2rem;
}

.sidebar__field {
  display: grid;
  min-width: 0;
  color: rgba(247, 243, 235, 0.82);
  font-size: 0.82rem;
}

.sidebar__field--compact {
  width: auto;
  flex: 0 0 auto;
}

.sidebar__datetime-stack {
  display: grid;
  gap: 0.55rem;
  align-content: center;
}

.sidebar__brand .sidebar__class-select {
  width: 100%;
  max-width: none;
}

.sidebar__live-button {
  display: grid;
  place-items: center;
  width: 56px;
  min-width: 56px;
  height: 56px;
  border: 0;
  border-radius: 999px;
  background: rgba(255, 255, 255, 0.18);
  color: var(--text-on-dark);
  font-weight: 700;
  cursor: pointer;
  transition: background 0.2s ease, color 0.2s ease;
}

.sidebar__live-button-text {
  display: inline-block;
}

.sidebar__live-button.is-live {
  background: #c4463a;
  color: #fff7f5;
}

.sidebar__live-button--collapsed {
  display: none;
  grid-column: 1;
  grid-row: 2;
}

.sidebar__datetime-input {
  width: 100%;
  min-height: 38px;
  padding: 0.4rem 0.65rem;
  border: 1px solid rgba(255, 255, 255, 0.24);
  border-radius: 12px;
  background: rgba(255, 255, 255, 0.08);
  color: var(--text-on-dark);
}

.sidebar__datetime-input::-webkit-calendar-picker-indicator {
  filter: invert(1);
}

.sidebar__class-select {
  min-height: 38px;
  max-width: 160px;
  padding: 0.4rem 2rem 0.4rem 0.75rem;
  border: 1px solid rgba(255, 255, 255, 0.24);
  border-radius: 999px;
  background: rgba(255, 255, 255, 0.16);
  color: rgba(247, 243, 235, 0.96);
  font: inherit;
}

.sidebar__class-select:disabled {
  opacity: 0.6;
}

.sidebar__class-select option {
  background: var(--surface);
  color: rgba(31, 36, 48, 0.82);
}

.collapsed-class-picker {
  position: absolute;
  top: 0;
  left: calc(100% + 0.5rem);
  z-index: 80;
  display: grid;
  gap: 0.35rem;
  min-width: 220px;
  padding: 0.5rem;
  border: 1px solid rgba(255, 255, 255, 0.14);
  border-radius: 16px;
  background: rgba(23, 49, 62, 0.98);
  box-shadow: var(--shadow);
}

.collapsed-class-picker[hidden] {
  display: none !important;
}

.collapsed-class-picker__item,
.collapsed-class-picker__empty {
  display: block;
  width: 100%;
  padding: 0.7rem 0.8rem;
  border: 0;
  border-radius: 12px;
  background: transparent;
  color: rgba(247, 243, 235, 0.84);
  text-align: left;
  font: inherit;
}

.collapsed-class-picker__item {
  cursor: pointer;
}

.collapsed-class-picker__item.is-active {
  background: rgba(255, 255, 255, 0.12);
  color: rgba(247, 243, 235, 0.98);
}

.sidebar__nav {
  display: grid;
  gap: 0.7rem;
}

.sidebar__footer {
  margin-top: auto;
  padding-top: 1rem;
  border-top: 1px solid rgba(255, 255, 255, 0.14);
}

.sidebar__footer-actions {
  display: grid;
  grid-template-columns: repeat(3, 56px);
  justify-content: center;
  gap: 0.55rem;
}

.sidebar__storage-button {
  display: inline-grid;
  place-items: center;
  width: 100%;
  min-height: 56px;
  padding: 0.75rem;
  border: 0;
  border-radius: 16px;
  background: transparent;
  color: #f7f3eb;
  cursor: pointer;
  transition: background-color 0.2s ease, color 0.2s ease, transform 0.2s ease, opacity 0.2s ease;
  opacity: 1;
}

.sidebar__storage-button--secondary {
  min-height: 56px;
  padding: 0.75rem;
  border: 1px solid rgba(255, 255, 255, 0.14);
  background: rgba(255, 255, 255, 0.04);
}

.sidebar__storage-button.is-persisted {
  background: transparent;
  color: rgba(247, 243, 235, 0.38);
  opacity: 0.62;
}

.sidebar__storage-button.is-saving {
  background: transparent;
}

.sidebar__storage-button:active {
  transform: scale(0.98);
}

.sidebar__storage-button:focus-visible {
  outline: 2px solid rgba(255, 255, 255, 0.55);
  outline-offset: 2px;
}

.sidebar__storage-icon {
  display: inline-grid;
  place-items: center;
  min-width: 1.25rem;
  font-size: 1.2rem;
  line-height: 1;
}

.sidebar__storage-icon svg {
  width: 22px;
  height: 22px;
  stroke: currentColor;
  stroke-width: 2.2;
  stroke-linecap: round;
  stroke-linejoin: round;
  fill: none;
}

.sidebar__storage-label {
  display: none;
}

.nav-link {
  display: flex;
  align-items: center;
  gap: 0.9rem;
  width: 100%;
  min-height: 52px;
  padding: 0.95rem 1rem;
  border: 0;
  border-radius: 18px;
  background: transparent;
  color: inherit;
  text-align: left;
  cursor: pointer;
  transition: background-color 0.2s ease, transform 0.2s ease;
}

.nav-link.is-active {
  background: rgba(255, 255, 255, 0.16);
}

.sidebar__toggle:active,
.nav-link:active {
  transform: scale(0.98);
}

.sidebar__toggle:focus-visible,
.nav-link:focus-visible {
  outline: 2px solid rgba(255, 255, 255, 0.55);
  outline-offset: 2px;
}

.nav-link__icon {
  display: inline-grid;
  place-items: center;
  min-width: 1.25rem;
  font-size: 1rem;
}

.content {
  min-height: 0;
  overflow: auto;
  overscroll-behavior: contain;
  -webkit-overflow-scrolling: touch;
  padding: 2rem;
  padding-top: max(2rem, env(safe-area-inset-top));
  padding-right: max(2rem, env(safe-area-inset-right));
  padding-bottom: max(2rem, env(safe-area-inset-bottom));
}

.content__header {
  margin-bottom: 1.5rem;
}

.content__header.has-secondary-actions {
  padding-bottom: 4.8rem;
}

.content__header.has-secondary-actions--compact {
  padding-bottom: 3.1rem;
}

.content__header.has-secondary-actions--stacked {
  padding-bottom: 5.8rem;
}

.content__title-row {
  position: relative;
  display: flex;
  align-items: center;
  justify-content: flex-start;
  flex-wrap: wrap;
  gap: 1rem;
  min-height: 64px;
}

.content__title-row h1 {
  position: relative;
  z-index: 1;
  margin: 0;
  font-size: clamp(2rem, 5vw, 3.2rem);
}

.content__subtitle {
  margin: 0.5rem 0 0;
  color: rgba(23, 49, 62, 0.88);
  font-size: clamp(1.15rem, 2vw, 1.4rem);
  font-weight: 600;
}

.content__subtitle-main,
.content__subtitle-subtle {
  display: block;
}

.content__subtitle-subtle {
  margin-top: 0.24rem;
  color: rgba(23, 49, 62, 0.58);
  font-size: 0.9rem;
  font-weight: 500;
}

.content__subtitle-inline {
  display: inline-flex;
  align-items: center;
  gap: 0.75rem;
  flex-wrap: wrap;
}

.content__subtitle-room-select {
  min-height: 40px;
  padding: 0.45rem 2rem 0.45rem 0.75rem;
  border: 1px solid rgba(23, 49, 62, 0.14);
  border-radius: 999px;
  background: rgba(255, 255, 255, 0.82);
  color: var(--text);
  font: inherit;
  font-size: 0.98rem;
  font-weight: 600;
}

.content__subtitle-room-select:focus-visible {
  outline: 2px solid rgba(23, 49, 62, 0.2);
  outline-offset: 2px;
}

.content__subtitle-room-pill {
  display: inline-flex;
  align-items: center;
  min-height: 40px;
  padding: 0.45rem 0.85rem;
  border-radius: 999px;
  background: rgba(23, 49, 62, 0.08);
  color: var(--text);
  font-size: 0.98rem;
  font-weight: 600;
}

.class-view-mode-toggle {
  display: inline-grid;
  grid-template-columns: repeat(2, minmax(0, 1fr));
  gap: 0.35rem;
  margin: 0 auto 1.35rem;
  padding: 0.35rem;
  border: 1px solid rgba(23, 49, 62, 0.14);
  border-radius: 18px;
  background: rgba(239, 231, 214, 0.9);
  box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.65);
}

.class-view-mode-toggle__button {
  min-width: 148px;
  min-height: 48px;
  padding: 0.75rem 1.2rem;
  border: 0;
  border-radius: 14px;
  background: transparent;
  color: rgba(31, 36, 48, 0.72);
  font: inherit;
  font-weight: 700;
  cursor: pointer;
  transition: background 0.2s ease, color 0.2s ease, box-shadow 0.2s ease;
}

.class-view-mode-toggle__button.is-active {
  background: linear-gradient(180deg, rgba(37, 76, 93, 0.98), rgba(23, 49, 62, 0.98));
  color: var(--text-on-dark);
  box-shadow: 0 10px 24px rgba(23, 49, 62, 0.18);
}

.class-view-mode-toggle__button:focus-visible {
  outline: 2px solid rgba(23, 49, 62, 0.25);
  outline-offset: 2px;
}

.class-view-mode-toggle--header {
  margin: 0;
}

.class-view-mode-toggle--secondary {
  margin: 0;
}

.class-view-mode-toggle--secondary .class-view-mode-toggle__button {
  min-width: 136px;
  min-height: 44px;
  padding: 0.65rem 1rem;
}

.class-view-mode-toggle--multi .class-view-mode-toggle__button {
  min-width: 124px;
  padding-inline: 1rem;
}

#viewHeaderActions {
  position: absolute;
  left: 50%;
  top: 0;
  transform: translateX(-50%);
}

.view {
  display: none;
}

.view.is-active {
  display: block;
}

.panel-grid {
  display: grid;
  grid-template-columns: repeat(3, minmax(0, 1fr));
  gap: 1.2rem;
}

.panel-grid--klasse .panel--full {
  grid-column: 1 / -1;
}

.unterricht-layout {
  display: grid;
  grid-template-columns: minmax(320px, 420px) minmax(0, 1fr);
  gap: 1.2rem;
  align-items: start;
}

.unterricht-layout--live {
  grid-template-columns: minmax(0, 1fr);
}

.unterricht-layout__seatplan,
.unterricht-layout__content {
  min-height: 220px;
}

.unterricht-layout__seatplan--full {
  width: 100%;
}

.unterricht-layout--live .unterricht-layout__seatplan--full {
  min-height: auto;
  padding: 0 0 4.4rem 0;
  border: 0;
  border-radius: 0;
  background: transparent;
  box-shadow: none;
  backdrop-filter: none;
}

.unterricht-seatplan {
  display: flex;
  justify-content: flex-start;
  width: 100%;
}

.unterricht-live-notice {
  margin: 0 0 1rem 0;
  padding: 0.85rem 1rem;
  border: 1px solid rgba(199, 104, 55, 0.22);
  border-radius: 16px;
  background: rgba(199, 104, 55, 0.1);
  color: #8f3d18;
  font-weight: 600;
}

.unterricht-live-notice--manual {
  border-color: rgba(37, 76, 93, 0.18);
  background: rgba(37, 76, 93, 0.08);
  color: #254c5d;
}

.unterricht-live-notice__subline {
  margin-top: 0.35rem;
  font-size: 0.92rem;
  font-weight: 500;
}

.unterricht-seatplan-frame {
  display: inline-block;
  width: max-content;
  max-width: 100%;
}

.unterricht-seatplan-canvas-anchor {
  position: relative;
  display: inline-block;
  width: max-content;
  max-width: 100%;
}

.unterricht-seatplan-actions {
  position: absolute;
  left: 50%;
  top: calc(100% - 1px);
  transform: translateX(-50%);
  display: flex;
  gap: 0.6rem;
  align-items: center;
  padding: 0.45rem 0.7rem;
  border: 1px solid rgba(23, 49, 62, 0.12);
  border-top: 0;
  border-radius: 0 0 18px 18px;
  background: rgba(239, 231, 214, 0.58);
  justify-items: center;
}

.unterricht-seatplan-action {
  display: inline-grid;
  place-items: center;
  width: 42px;
  height: 42px;
  border: 1px solid transparent;
  border-radius: 12px;
  background: rgba(255, 255, 255, 0.42);
  color: rgba(31, 36, 48, 0.62);
  font: inherit;
  font-size: 1rem;
  font-weight: 700;
  cursor: pointer;
  box-shadow: none;
}

.unterricht-seatplan-action.is-active {
  border-color: rgba(37, 76, 93, 0.18);
  background: rgba(255, 255, 255, 0.9);
  color: var(--text);
  box-shadow: 0 8px 18px rgba(23, 49, 62, 0.08);
}

.unterricht-seatplan-student {
  cursor: default;
  position: relative;
}

.unterricht-seatplan-student.is-interactive {
  cursor: pointer;
}

.unterricht-seatplan-student.is-absent {
  background: rgba(199, 104, 55, 0.16);
  box-shadow: inset 0 0 0 1px rgba(199, 104, 55, 0.22);
}

.unterricht-seatplan-student.is-muted {
  opacity: 0.42;
  filter: saturate(0.2);
}

.unterricht-seatplan-slot.seat-order-slot--visual-left,
.unterricht-seatplan-slot.seat-order-slot--visual-right,
.unterricht-seatplan-slot.seat-order-slot--visual-top,
.unterricht-seatplan-slot.seat-order-slot--visual-bottom {
  border: 0;
}

.unterricht-seatplan-student .seat-order-desk__label--readonly {
  pointer-events: none;
  cursor: inherit;
}

.unterricht-seatplan-student.is-interactive {
  touch-action: none;
}

.unterricht-seatplan-student {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 0.32rem;
}

.unterricht-seatplan-student.is-absent .seat-order-desk__label--readonly {
  color: #8f3d18;
}

.unterricht-seatplan-student.is-muted .seat-order-desk__label--readonly {
  color: rgba(31, 36, 48, 0.56);
}

.unterricht-seatplan-student .seat-order-desk__label--readonly {
  font-size: 0.98rem;
  font-weight: 800;
  line-height: 1.15;
}

.unterricht-seatplan-homework-badge {
  position: static;
  display: inline-grid;
  place-items: center;
  min-width: 18px;
  height: 18px;
  padding: 0 4px;
  border-radius: 999px;
  font-size: 0.68rem;
  font-weight: 800;
  line-height: 1;
  letter-spacing: 0.02em;
  background: rgba(78, 152, 76, 0.92);
  color: #ffffff;
  box-shadow: 0 0 0 1px rgba(63, 138, 64, 0.18);
  opacity: 0.62;
}

.unterricht-seatplan-homework-badge.is-missing {
  background: rgba(199, 104, 55, 0.96);
  color: #ffffff;
  box-shadow: 0 0 0 1px rgba(199, 104, 55, 0.24);
}

.unterricht-seatplan-homework-badge.is-excellent {
  background: rgba(52, 121, 104, 0.96);
  color: #ffffff;
  box-shadow: 0 0 0 1px rgba(52, 121, 104, 0.24);
}

.unterricht-seatplan-homework-badge.is-muted {
  opacity: 0.44;
  filter: saturate(0.45);
}

.unterricht-seatplan-homework-badge.is-emphasized {
  opacity: 1;
  filter: none;
}

.unterricht-seatplan-warning-badge {
  position: static;
  display: inline-flex;
  align-items: center;
  gap: 3px;
  min-height: 18px;
  padding: 0 5px;
  border-radius: 999px;
  background: rgba(205, 154, 55, 0.96);
  color: #ffffff;
  font-size: 0.68rem;
  font-weight: 800;
  line-height: 1;
  box-shadow: 0 0 0 1px rgba(205, 154, 55, 0.24);
  opacity: 0.62;
}

.unterricht-seatplan-warning-badge__count {
  display: inline-block;
  min-width: 8px;
  text-align: center;
}

.unterricht-seatplan-warning-badge.is-muted {
  opacity: 0.44;
  filter: saturate(0.45);
}

.unterricht-seatplan-warning-badge.is-emphasized {
  opacity: 1;
  filter: none;
}

.unterricht-seatplan-assessment-count {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 0.18rem;
  min-height: 22px;
  padding: 0 6px;
  border-radius: 999px;
  text-align: center;
  font-size: 0.78rem;
  font-weight: 800;
  line-height: 1;
  background: rgba(205, 154, 55, 0.16);
  color: #9e6d11;
  box-shadow: 0 0 0 1px rgba(205, 154, 55, 0.18);
  opacity: 0.72;
}

.unterricht-seatplan-assessment-count__icon,
.unterricht-seatplan-assessment-count__value {
  display: inline-block;
}

.unterricht-seatplan-assessment-count.is-empty {
  background: rgba(205, 154, 55, 0.16);
  color: #9e6d11;
  box-shadow: 0 0 0 1px rgba(205, 154, 55, 0.18);
}

.unterricht-seatplan-assessment-count.is-positive {
  background: rgba(78, 152, 76, 0.16);
  color: #2f7a31;
  box-shadow: 0 0 0 1px rgba(78, 152, 76, 0.18);
}

.unterricht-seatplan-assessment-count.is-overdue {
  background: rgba(199, 104, 55, 0.16);
  color: #a5451b;
  box-shadow: 0 0 0 1px rgba(199, 104, 55, 0.18);
}

.unterricht-seatplan-assessment-count.is-muted {
  opacity: 0.5;
  filter: saturate(0.5);
}

.unterricht-seatplan-assessment-count.is-emphasized {
  opacity: 1;
  filter: none;
}

.unterricht-seatplan-assessment-count.is-empty.is-emphasized {
  background: rgba(205, 154, 55, 0.96);
  color: #ffffff;
  box-shadow: 0 0 0 1px rgba(205, 154, 55, 0.24);
}

.unterricht-seatplan-assessment-count.is-positive.is-emphasized {
  background: rgba(78, 152, 76, 0.96);
  color: #ffffff;

function createDomainSnapshot(rawData) {
  const {

        validFrom: item.validFrom || "",
        validTo: item.validTo || ""
      }, item));

function serializeDomainSnapshot(snapshot) {
  function cloneItems(items, keys) {
    return items.map(function (item) {
      const plainItem = {};
      var index;

      for (index = 0; index < keys.length; index += 1) {
        plainItem[keys[index]] = item[keys[index]];
      }

      return plainItem;
    });
  }

  function cloneTimetable(timetable) {
    const source = timetable || {};
    const rows = Array.isArray(source.rows) ? source.rows : [];

    return {
      id: source.id || "",
      validFrom: source.validFrom || "",
      validTo: source.validTo || "",
      startTime: source.startTime || "07:50",
      rows: rows.map(function (row) {
        const rowDays = row.days || {};
        const nextDays = {};

        ["1", "2", "3", "4", "5"].forEach(function (weekday) {
          const dayEntry = rowDays[weekday] || {};
          nextDays[weekday] = {
            classId: dayEntry.classId || "",
            room: dayEntry.room || "",
            isDouble: Boolean(dayEntry.isDouble)
          };
        });

        return {
          id: row.id,
          type: row.type === "pause" ? "pause" : "lesson",
          durationMinutes: Number(row.durationMinutes) || (row.type === "pause" ? 5 : 45),
          days: nextDays
        };
      })
    };
  }

  return {
    activeClassId: snapshot.activeClassId || null,
    activeTimetableId: snapshot.activeTimetableId || (snapshot.timetables && snapshot.timetables[0] ? snapshot.timetables[0].id : null),
    activeSeatPlanId: snapshot.activeSeatPlanId || null,

    activeDateTime: snapshot.activeDateTime || "",

    attendanceRecords: cloneItems(snapshot.attendanceRecords || [], ["id", "studentId", "classId", "lessonId", "lessonDate", "room", "status", "recordedAt", "effectiveAt"]),
    homeworkRecords: cloneItems(snapshot.homeworkRecords || [], ["id", "studentId", "classId", "lessonId", "lessonDate", "room", "recordedAt", "quality"]),
    warningRecords: cloneItems(snapshot.warningRecords || [], ["id", "studentId", "classId", "lessonId", "lessonDate", "room", "recordedAt", "category", "note"]),

    seatOrders: cloneItems(snapshot.seatOrders || [], ["id", "classId", "room", "validFrom", "validTo", "updatedAt", "seats"])
  };
}

window.Unterrichtsassistent = window.Unterrichtsassistent || {};

const DB_NAME = "unterrichtsassistent";
const DB_VERSION = 1;
const STORE_NAMES = ["appState"];

function openDatabase() {
  return new Promise((resolve, reject) => {
    const request = indexedDB.open(DB_NAME, DB_VERSION);

    request.onupgradeneeded = () => {
      const database = request.result;
      STORE_NAMES.forEach((storeName) => {
        if (!database.objectStoreNames.contains(storeName)) {
          database.createObjectStore(storeName);
        }
      });
    };

    request.onsuccess = () => resolve(request.result);
    request.onerror = () => reject(request.error);
  });
}

async function withStore(mode, callback) {
  const database = await openDatabase();

  return new Promise((resolve, reject) => {
    const transaction = database.transaction(STORE_NAMES, mode);
    const store = transaction.objectStore("appState");
    const result = callback(store);

    transaction.oncomplete = () => {
      database.close();
      resolve(result);
    };

    transaction.onerror = () => {
      database.close();
      reject(transaction.error);
    };
  });
}

async function readState(key) {
  const database = await openDatabase();

  return new Promise((resolve, reject) => {
    const transaction = database.transaction(STORE_NAMES, "readonly");
    const store = transaction.objectStore("appState");
    const request = store.get(key);

    request.onsuccess = () => resolve(request.result);
    request.onerror = () => reject(request.error);
    transaction.oncomplete = () => database.close();
  });
}

async function writeState(key, value) {
  return withStore("readwrite", (store) => {
    store.put(value, key);
  });
}

async function writeStates(entries) {
  return withStore("readwrite", (store) => {
    Object.keys(entries || {}).forEach((key) => {
      store.put(entries[key], key);
    });
  });
}

window.Unterrichtsassistent.data.readState = readState;
window.Unterrichtsassistent.data.writeState = writeState;
window.Unterrichtsassistent.data.writeStates = writeStates;

function normalizeClassName(className) {
  if (!className) {
    return "";
  }

  return String(className).replace(/^0+(\d)/, "$1").trim();
}

function createPastelColor(seed) {
  const palette = [
    "#f4c7c3",
    "#f7d9a8",
    "#f5e6a7",
    "#cfe7b0",
    "#b8e0d2",
    "#bcdff5",
    "#cfd2f6",
    "#e1c8f2",
    "#f5cfe0",
    "#d9d4cb"
  ];
  const normalizedSeed = String(seed || "");
  let hash = 0;
  let index;

  for (index = 0; index < normalizedSeed.length; index += 1) {
    hash = ((hash << 5) - hash) + normalizedSeed.charCodeAt(index);
    hash |= 0;
  }

  return palette[Math.abs(hash) % palette.length];
}

function createEmptyClass(rawSnapshot, className, subjectName) {
  const normalizedClassName = normalizeClassName(className) || "Neue Lerngruppe";
  const trimmedSubject = sanitizeValue(subjectName);
  const newClass = {
    id: "class-" + Date.now(),
    name: normalizedClassName,
    room: "",
    subject: trimmedSubject,
    studentIds: [],
    displayColor: createPastelColor(normalizedClassName + "::" + trimmedSubject)
  };

  rawSnapshot.classes = Array.isArray(rawSnapshot.classes) ? rawSnapshot.classes : [];
  rawSnapshot.classes.push(newClass);
  rawSnapshot.activeClassId = newClass.id;

  return rawSnapshot;
}

function sanitizeValue(value) {
  if (value === undefined || value === null) {
    return "";
  }

  return String(value).trim();
}

function createClassKey(className, subjectName) {
  return [sanitizeValue(className), sanitizeValue(subjectName)].join("::");
}

function parseDelimitedLine(line, delimiter) {
  return line.split(delimiter).map(function (cell) {
    return sanitizeValue(cell);
  });
}

function parseStudentCsv(text) {
  const lines = text.replace(/\r/g, "").split("\n").filter(function (line) {
    return line.trim() !== "";
  });

  if (!lines.length) {
    return [];
  }

  const delimiter = lines[0].indexOf("\t") >= 0 ? "\t" : ";";
  const headers = parseDelimitedLine(lines[0], delimiter);
  const records = [];
  var lineIndex;

  for (lineIndex = 1; lineIndex < lines.length; lineIndex += 1) {
    const cells = parseDelimitedLine(lines[lineIndex], delimiter);
    const row = {};
    var columnIndex;

    for (columnIndex = 0; columnIndex < headers.length; columnIndex += 1) {
      row[headers[columnIndex]] = cells[columnIndex] || "";
    }

    if (!row.Vorname && !row.Langname) {
      continue;
    }

    records.push({
      id: "import-" + lineIndex + "-" + Date.now(),
      firstName: sanitizeValue(row.Vorname),
      lastName: sanitizeValue(row.Langname),
      className: normalizeClassName(row.Klasse),
      gender: sanitizeValue(row.Geschlecht),
      strengths: [],
      gaps: [],
      attendanceRate: 1
    });
  }

  return records;
}

function mergeImportedStudents(rawSnapshot, importedStudents, className, subjectName) {
  const classMap = {};
  const targetClasses = {};
  const replacedStudentIds = {};
  const preservedStudents = [];
  const normalizedClassName = normalizeClassName(className);
  let lastActiveClassId = rawSnapshot.activeClassId || null;
  var index;

  rawSnapshot.classes = Array.isArray(rawSnapshot.classes) ? rawSnapshot.classes : [];
  rawSnapshot.students = Array.isArray(rawSnapshot.students) ? rawSnapshot.students : [];

  for (index = 0; index < rawSnapshot.classes.length; index += 1) {
    classMap[createClassKey(rawSnapshot.classes[index].name, rawSnapshot.classes[index].subject)] = rawSnapshot.classes[index];
  }

  for (index = 0; index < importedStudents.length; index += 1) {
    const importedClassName = normalizedClassName || normalizeClassName(importedStudents[index].className) || "Neue Lerngruppe";
    importedStudents[index].className = importedClassName;
    const classKey = createClassKey(importedClassName, subjectName);
    let schoolClass = classMap[classKey];

    if (!schoolClass) {
      schoolClass = {
        id: "class-" + Date.now() + "-" + index,
        name: importedClassName,
        room: "",
        subject: subjectName || "",
        studentIds: [],
        displayColor: createPastelColor(importedClassName + "::" + (subjectName || ""))
      };
      rawSnapshot.classes.push(schoolClass);
      classMap[classKey] = schoolClass;
    }

    schoolClass.subject = subjectName || schoolClass.subject || "";
    schoolClass.displayColor = schoolClass.displayColor || createPastelColor(importedClassName + "::" + (schoolClass.subject || ""));
    targetClasses[schoolClass.id] = true;
    lastActiveClassId = schoolClass.id;
  }

  for (index = 0; index < rawSnapshot.classes.length; index += 1) {
    if (targetClasses[rawSnapshot.classes[index].id]) {
      (rawSnapshot.classes[index].studentIds || []).forEach(function (studentId) {
        replacedStudentIds[studentId] = true;
      });
      rawSnapshot.classes[index].studentIds = [];
    }
  }

  for (index = 0; index < rawSnapshot.students.length; index += 1) {
    if (!replacedStudentIds[rawSnapshot.students[index].id]) {
      preservedStudents.push(rawSnapshot.students[index]);
    }
  }

  rawSnapshot.students = preservedStudents.concat(importedStudents);

  for (index = 0; index < importedStudents.length; index += 1) {
    const student = importedStudents[index];
    const targetClass = classMap[createClassKey(student.className || "Neue Lerngruppe", subjectName)];
    targetClass.studentIds.push(student.id);
  }

  rawSnapshot.activeClassId = lastActiveClassId;

  return rawSnapshot;
}

(function () {
  const textEncoder = new TextEncoder();
  const AUTH_VERSION = 1;
  const KDF_NAME = "PBKDF2";
  const KDF_HASH = "SHA-256";
  const WRAP_ALGORITHM = "AES-GCM";
  const KDF_ITERATIONS = 250000;
  const SALT_BYTES = 16;
  const WRAP_IV_BYTES = 12;
  const MASTER_KEY_BYTES = 32;
  const SESSION_STORAGE_KEY = "unterrichtsassistent-auth-session";
  const SESSION_MASTER_KEY_STORAGE_KEY = "unterrichtsassistent-auth-master-key";
  const IDLE_TIMEOUT_MS = 5 * 60 * 1000;

  function ensureCryptoSupport() {
    return Boolean(window.crypto && window.crypto.subtle && window.crypto.getRandomValues);
  }

  function createRandomBytes(length) {
    const bytes = new Uint8Array(length);
    window.crypto.getRandomValues(bytes);
    return bytes;
  }

  function encodeBase64(bytes) {
    let binary = "";
    let index = 0;

    for (index = 0; index < bytes.length; index += 1) {
      binary += String.fromCharCode(bytes[index]);
    }

    return window.btoa(binary);
  }

  function decodeBase64(value) {
    const binary = window.atob(String(value || ""));
    const bytes = new Uint8Array(binary.length);
    let index = 0;

    for (index = 0; index < binary.length; index += 1) {
      bytes[index] = binary.charCodeAt(index);
    }

    return bytes;
  }

  async function deriveWrappingKey(password, saltBytes, usages) {
    const baseKey = await window.crypto.subtle.importKey(
      "raw",
      textEncoder.encode(String(password || "")),
      { name: KDF_NAME },
      false,
      ["deriveKey"]
    );

    return window.crypto.subtle.deriveKey(
      {
        name: KDF_NAME,
        hash: KDF_HASH,
        salt: saltBytes,
        iterations: KDF_ITERATIONS
      },
      baseKey,
      {
        name: WRAP_ALGORITHM,
        length: 256
      },
      false,
      usages
    );
  }

  async function createPasswordAuthRecord(password) {
    const normalizedPassword = String(password || "");
    const saltBytes = createRandomBytes(SALT_BYTES);
    const wrapIvBytes = createRandomBytes(WRAP_IV_BYTES);
    const masterKeyBytes = createRandomBytes(MASTER_KEY_BYTES);
    const wrappingKey = await deriveWrappingKey(normalizedPassword, saltBytes, ["encrypt"]);
    const encryptedMasterKey = await window.crypto.subtle.encrypt(
      {
        name: WRAP_ALGORITHM,
        iv: wrapIvBytes
      },
      wrappingKey,
      masterKeyBytes
    );

    return {
      version: AUTH_VERSION,
      kdf: KDF_NAME,
      hash: KDF_HASH,
      iterations: KDF_ITERATIONS,
      wrapAlgorithm: WRAP_ALGORITHM,
      salt: encodeBase64(saltBytes),
      wrapIv: encodeBase64(wrapIvBytes),
      encryptedMasterKey: encodeBase64(new Uint8Array(encryptedMasterKey)),
      createdAt: new Date().toISOString()
    };
  }

  async function unlockPasswordAuthRecord(password, authRecord) {
    const record = authRecord || {};
    const wrappingKey = await deriveWrappingKey(
      password,
      decodeBase64(record.salt),
      ["decrypt"]
    );
    const decryptedBytes = await window.crypto.subtle.decrypt(
      {
        name: WRAP_ALGORITHM,
        iv: decodeBase64(record.wrapIv)
      },
      wrappingKey,
      decodeBase64(record.encryptedMasterKey)
    );

    return new Uint8Array(decryptedBytes);
  }

  function createUnlockSession(masterKeyBytes) {
    const now = Date.now();
    const session = {
      unlockedAt: now,
      expiresAt: now + IDLE_TIMEOUT_MS
    };

    window.sessionStorage.setItem(SESSION_STORAGE_KEY, JSON.stringify(session));
    if (masterKeyBytes && masterKeyBytes.length) {
      window.sessionStorage.setItem(SESSION_MASTER_KEY_STORAGE_KEY, encodeBase64(masterKeyBytes));
    }
    return session;
  }

  function getUnlockSession() {
    try {
      return JSON.parse(window.sessionStorage.getItem(SESSION_STORAGE_KEY) || "null");
    } catch (error) {
      return null;
    }
  }

  function touchUnlockSession() {
    const currentSession = getUnlockSession();
    const now = Date.now();

    if (!currentSession) {
      return null;
    }

    currentSession.expiresAt = now + IDLE_TIMEOUT_MS;
    window.sessionStorage.setItem(SESSION_STORAGE_KEY, JSON.stringify(currentSession));
    return currentSession;
  }

  function hasValidUnlockSession() {
    const session = getUnlockSession();

    return Boolean(session && Number(session.expiresAt) > Date.now());
  }

  function getSessionMasterKeyBytes() {
    const encodedValue = window.sessionStorage.getItem(SESSION_MASTER_KEY_STORAGE_KEY);

    return encodedValue ? decodeBase64(encodedValue) : null;
  }

  function clearSessionMasterKey() {
    window.sessionStorage.removeItem(SESSION_MASTER_KEY_STORAGE_KEY);
  }

  function clearUnlockSession() {
    window.sessionStorage.removeItem(SESSION_STORAGE_KEY);
    clearSessionMasterKey();
  }

  window.Unterrichtsassistent.security.passwordAuth = {
    idleTimeoutMs: IDLE_TIMEOUT_MS,
    ensureCryptoSupport: ensureCryptoSupport,
    createPasswordAuthRecord: createPasswordAuthRecord,
    unlockPasswordAuthRecord: unlockPasswordAuthRecord,
    createUnlockSession: createUnlockSession,
    getUnlockSession: getUnlockSession,
    touchUnlockSession: touchUnlockSession,
    hasValidUnlockSession: hasValidUnlockSession,
    getSessionMasterKeyBytes: getSessionMasterKeyBytes,
    clearSessionMasterKey: clearSessionMasterKey,
    clearUnlockSession: clearUnlockSession
  };
}());

(function () {
  const SNAPSHOT_RECORD_VERSION = 1;
  const SNAPSHOT_ALGORITHM = "AES-GCM";
  const SNAPSHOT_IV_BYTES = 12;
  const textEncoder = new TextEncoder();
  const textDecoder = new TextDecoder();

  function createRandomBytes(length) {
    const bytes = new Uint8Array(length);
    window.crypto.getRandomValues(bytes);
    return bytes;
  }

  function encodeBase64(bytes) {
    let binary = "";
    let index = 0;

    for (index = 0; index < bytes.length; index += 1) {
      binary += String.fromCharCode(bytes[index]);
    }

    return window.btoa(binary);
  }

  function decodeBase64(value) {
    const binary = window.atob(String(value || ""));
    const bytes = new Uint8Array(binary.length);
    let index = 0;

    for (index = 0; index < binary.length; index += 1) {
      bytes[index] = binary.charCodeAt(index);
    }

    return bytes;
  }

  function isEncryptedSnapshotRecord(record) {
    return Boolean(
      record
      && typeof record === "object"
      && record.algorithm === SNAPSHOT_ALGORITHM
      && typeof record.iv === "string"
      && typeof record.ciphertext === "string"
    );
  }

  async function importMasterKey(masterKeyBytes, usages) {
    return window.crypto.subtle.importKey(
      "raw",
      masterKeyBytes,
      { name: SNAPSHOT_ALGORITHM },
      false,
      usages
    );
  }

  async function encryptSnapshot(snapshot, masterKeyBytes) {
    const ivBytes = createRandomBytes(SNAPSHOT_IV_BYTES);
    const plaintextBytes = textEncoder.encode(JSON.stringify(snapshot || {}));
    const cryptoKey = await importMasterKey(masterKeyBytes, ["encrypt"]);
    const ciphertext = await window.crypto.subtle.encrypt(
      {
        name: SNAPSHOT_ALGORITHM,
        iv: ivBytes
      },
      cryptoKey,
      plaintextBytes
    );

    return {
      version: SNAPSHOT_RECORD_VERSION,
      algorithm: SNAPSHOT_ALGORITHM,
      iv: encodeBase64(ivBytes),
      ciphertext: encodeBase64(new Uint8Array(ciphertext)),
      encryptedAt: new Date().toISOString()
    };
  }

  async function decryptSnapshot(record, masterKeyBytes) {
    const cryptoKey = await importMasterKey(masterKeyBytes, ["decrypt"]);
    const plaintextBuffer = await window.crypto.subtle.decrypt(
      {
        name: SNAPSHOT_ALGORITHM,
        iv: decodeBase64(record.iv)
      },
      cryptoKey,
      decodeBase64(record.ciphertext)
    );

    return JSON.parse(textDecoder.decode(plaintextBuffer) || "{}");
  }

  window.Unterrichtsassistent.security.appDataCrypto = {
    isEncryptedSnapshotRecord: isEncryptedSnapshotRecord,
    encryptSnapshot: encryptSnapshot,
    decryptSnapshot: decryptSnapshot
  };
}());

const WEEKDAY_KEYS = ["1", "2", "3", "4", "5"];

function getCurrentWeekdayIndex(date = new Date()) {
  const day = date.getDay();
  return day === 0 ? 7 : day;
}

function minutesToTime(totalMinutes) {
  const hours = Math.floor(totalMinutes / 60);
  const minutes = totalMinutes % 60;
  return String(hours).padStart(2, "0") + ":" + String(minutes).padStart(2, "0");
}

function timeToMinutes(time) {
  const parts = String(time || "").split(":");
  const hours = Number(parts[0]);
  const minutes = Number(parts[1]);

  if (parts.length !== 2 || Number.isNaN(hours) || Number.isNaN(minutes)) {
    return 470;
  }

  return (hours * 60) + minutes;
}

function normalizeDayEntry(entry) {
  return {
    classId: entry && entry.classId ? entry.classId : "",
    room: entry && entry.room ? entry.room : "",
    isDouble: Boolean(entry && entry.isDouble)
  };
}

function normalizeTimetableRow(row, index) {
  const type = row && row.type === "pause" ? "pause" : "lesson";
  const rowDays = row && row.days ? row.days : {};
  const days = {};

  WEEKDAY_KEYS.forEach(function (weekdayKey) {
    days[weekdayKey] = normalizeDayEntry(rowDays[weekdayKey]);
  });

  return {
    id: row && row.id ? row.id : "timetable-row-" + String(index + 1),
    type: type,
    durationMinutes: Number(row && row.durationMinutes) || (type === "pause" ? 5 : 45),
    days: days

}

function normalizeTimetable(timetable) {

  return {
    id: source.id || "",
    validFrom: source.validFrom || "",
    validTo: source.validTo || "",
    startTime: source.startTime || "07:50",
    rows: rows.map(normalizeTimetableRow)
  };
}

function normalizeWarningRecord(warningRecord) {

    ? String(source.category || "").trim()

    category: category,
    note: String(source.note || "").trim()
  };
}

function normalizeDateValue(value) {
  return String(value || "").slice(0, 10);
}

function getLocalDateValue(date) {
  const year = date.getFullYear();
  const month = String(date.getMonth() + 1).padStart(2, "0");
  const day = String(date.getDate()).padStart(2, "0");
  return year + "-" + month + "-" + day;
}

function compareDateValues(left, right) {
  if (left === right) {
    return 0;
  }

  if (!left) {
    return -1;
  }

  if (!right) {
    return 1;
  }

  return left < right ? -1 : 1;
}

function buildTimetableRows(timetable) {
  const normalizedTimetable = normalizeTimetable(timetable);
  const rows = normalizedTimetable.rows.map(function (row) {
    return {
      id: row.id,
      type: row.type,
      durationMinutes: row.durationMinutes,
      days: row.days
    };
  });
  let currentMinutes = timeToMinutes(normalizedTimetable.startTime);

  rows.forEach(function (row) {
    const startMinutes = currentMinutes;
    const endMinutes = startMinutes + row.durationMinutes;

    row.startTime = minutesToTime(startMinutes);
    row.endTime = minutesToTime(endMinutes);
    row.cells = {};
    currentMinutes = endMinutes;
  });

  WEEKDAY_KEYS.forEach(function (weekdayKey) {
    let activeDoubleSource = null;

    rows.forEach(function (row) {
      const dayEntry = row.days[weekdayKey] || normalizeDayEntry();
      const cell = {
        classId: dayEntry.classId || "",
        room: dayEntry.room || "",
        isDouble: row.type === "lesson" && Boolean(dayEntry.classId) && Boolean(dayEntry.isDouble),
        isBlocked: false,
        inheritedClassId: "",
        inheritedRoom: "",
        sourceRowId: null
      };

      if (activeDoubleSource) {
        cell.isBlocked = true;
        cell.inheritedClassId = activeDoubleSource.classId;
        cell.inheritedRoom = activeDoubleSource.room;
        cell.sourceRowId = activeDoubleSource.rowId;

        if (row.type === "lesson") {
          activeDoubleSource = null;
        }
      }

      if (!cell.isBlocked && row.type === "lesson" && cell.isDouble) {
        activeDoubleSource = {
          classId: cell.classId,
          room: cell.room,
          rowId: row.id
        };
      }

      row.cells[weekdayKey] = cell;
    });
  });

  return rows;
}

class SchoolService {
  constructor(snapshot) {
    this.snapshot = snapshot;
  }

  getReferenceDate() {
    if ((this.snapshot.activeDateTimeMode || "live") === "live") {
      return new Date();
    }

    const activeDateTime = String(this.snapshot.activeDateTime || "").trim();
    const parsedDate = activeDateTime ? new Date(activeDateTime) : null;

    if (parsedDate && !Number.isNaN(parsedDate.getTime())) {
      return parsedDate;
    }

    return new Date();
  }

  getWeekdays() {
    return WEEKDAY_META.slice();
  }

  getAllTimetables() {
    return (this.snapshot.timetables || []).map(normalizeTimetable).sort(function (left, right) {
      return compareDateValues(right.validFrom, left.validFrom);
    });
  }

  getTimetableById(timetableId) {
    return this.getAllTimetables().find(function (timetable) {
      return timetable.id === timetableId;
    }) || null;
  }

  getCurrentTimetable(date) {
    const effectiveDate = date || this.getReferenceDate();
    const todayValue = getLocalDateValue(effectiveDate);
    const matchingTimetables = this.getAllTimetables().filter(function (timetable) {
      const validFrom = normalizeDateValue(timetable.validFrom);
      const validTo = normalizeDateValue(timetable.validTo);
      const startsBefore = !validFrom || compareDateValues(validFrom, todayValue) <= 0;
      const endsAfter = !validTo || compareDateValues(validTo, todayValue) >= 0;

      return startsBefore && endsAfter;
    }).sort(function (left, right) {
      return compareDateValues(right.validFrom, left.validFrom);
    });

    return matchingTimetables[0] || this.getAllTimetables()[0] || null;
  }

  getManagedTimetable() {
    if (this.snapshot.activeTimetableId) {
      const activeTimetable = this.getTimetableById(this.snapshot.activeTimetableId);
      if (activeTimetable) {
        return activeTimetable;
      }
    }

    return this.getCurrentTimetable(this.getReferenceDate());
  }

  getTimetable() {
    return this.getManagedTimetable() || normalizeTimetable({});
  }

  getTimetableRows(timetable) {
    return buildTimetableRows(timetable || this.getManagedTimetable());
  }

  getRoomsForClass(classId) {
    const rooms = {};
    const activeClass = classId ? this.getClassById(classId) : null;

    this.getAllTimetables().forEach(function (timetable) {
      buildTimetableRows(timetable).forEach(function (row) {
        WEEKDAY_KEYS.forEach(function (weekdayKey) {
          const cell = row.cells[weekdayKey];
          const effectiveClassId = row.type === "lesson"
            ? (cell.isBlocked ? cell.inheritedClassId : cell.classId)
            : "";
          const effectiveRoom = row.type === "lesson"
            ? (cell.isBlocked ? cell.inheritedRoom : cell.room)
            : "";

          if (effectiveClassId === classId && effectiveRoom) {
            rooms[effectiveRoom] = true;
          }
        });
      });
    });

    if (!Object.keys(rooms).length && activeClass && activeClass.room) {
      rooms[activeClass.room] = true;
    }

    return Object.keys(rooms).sort();
  }

  getRelevantRoomForClass(classId, date) {
    const effectiveDate = date || this.getReferenceDate();
    const currentLessonUnit = this.getCurrentLessonForClass(classId, effectiveDate);
    const weekday = getCurrentWeekdayIndex(effectiveDate);
    const currentMinutes = (effectiveDate.getHours() * 60) + effectiveDate.getMinutes();
    const currentTimetable = this.getCurrentTimetable(effectiveDate);
    let fallbackRoom = "";

    if (currentLessonUnit && currentLessonUnit.room) {
      return currentLessonUnit.room;
    }

    if (!currentTimetable) {
      return this.getRoomsForClass(classId)[0] || "";
    }

    this.getTimetableRows(currentTimetable).forEach(function (row) {
      const starts = timeToMinutes(row.startTime);
      const ends = timeToMinutes(row.endTime);
      const cell = row.cells[String(weekday)] || null;
      const effectiveClassId = row.type === "lesson" && cell
        ? (cell.isBlocked ? cell.inheritedClassId : cell.classId)
        : "";
      const effectiveRoom = row.type === "lesson" && cell
        ? (cell.isBlocked ? cell.inheritedRoom : cell.room)
        : "";

      if (effectiveClassId === classId && effectiveRoom && !fallbackRoom) {
        fallbackRoom = effectiveRoom;
      }

      if (effectiveClassId === classId && effectiveRoom && currentMinutes >= starts && currentMinutes <= ends) {
        fallbackRoom = effectiveRoom;
      }
    });

    return fallbackRoom || this.getRoomsForClass(classId)[0] || "";
  }

  getLiveRoomForClass(classId, date) {
    const effectiveDate = date || this.getReferenceDate();
    const currentLessonUnit = this.getCurrentLessonForClass(classId, effectiveDate);
    const weekday = getCurrentWeekdayIndex(effectiveDate);
    const currentMinutes = (effectiveDate.getHours() * 60) + effectiveDate.getMinutes();
    const matchingLessons = this.getScheduledLessons(effectiveDate)
      .filter(function (lesson) {
        if (lesson.classId !== classId || !lesson.room) {
          return false;
        }

        if (lesson.weekday < weekday) {
          return true;
        }

        return lesson.weekday === weekday && timeToMinutes(lesson.startTime) <= currentMinutes;
      })
      .sort(function (left, right) {
        if (left.weekday !== right.weekday) {
          return right.weekday - left.weekday;
        }

        return timeToMinutes(right.startTime) - timeToMinutes(left.startTime);
      });

    if (currentLessonUnit && currentLessonUnit.room) {
      return currentLessonUnit.room;
    }

    return matchingLessons[0] ? matchingLessons[0].room : this.getRelevantRoomForClass(classId, effectiveDate);
  }

  getAllSeatPlans() {
    return (this.snapshot.seatPlans || []).map(normalizeSeatPlan).sort(function (left, right) {
      return compareDateValues(right.validFrom, left.validFrom);
    });
  }

  getSeatPlansForClass(classId) {
    return this.getAllSeatPlans().filter(function (seatPlan) {
      return seatPlan.classId === classId;
    });
  }

  getSeatPlansForClassAndRoom(classId, room) {
    return this.getSeatPlansForClass(classId).filter(function (seatPlan) {
      return (seatPlan.room || "") === (room || "");
    });
  }

  getCurrentSeatPlan(classId, room, date) {
    const effectiveDate = date || this.getReferenceDate();
    const todayValue = getLocalDateValue(effectiveDate);
    const seatPlans = this.getSeatPlansForClassAndRoom(classId, room);
    const matchingSeatPlans = seatPlans.filter(function (seatPlan) {
      const validFrom = normalizeDateValue(seatPlan.validFrom);
      const validTo = normalizeDateValue(seatPlan.validTo);
      const startsBefore = !validFrom || compareDateValues(validFrom, todayValue) <= 0;
      const endsAfter = !validTo || compareDateValues(validTo, todayValue) >= 0;

      return startsBefore && endsAfter;
    }).sort(function (left, right) {
      return compareDateValues(right.validFrom, left.validFrom);
    });
    const futureSeatPlans = seatPlans.filter(function (seatPlan) {
      const validFrom = normalizeDateValue(seatPlan.validFrom);

      return validFrom && compareDateValues(validFrom, todayValue) > 0;
    }).sort(function (left, right) {
      return compareDateValues(left.validFrom, right.validFrom);
    });
    const pastSeatPlans = seatPlans.filter(function (seatPlan) {
      const validTo = normalizeDateValue(seatPlan.validTo);

      return validTo && compareDateValues(validTo, todayValue) < 0;
    }).sort(function (left, right) {
      return compareDateValues(right.validTo, left.validTo);
    });

    return matchingSeatPlans[0] || futureSeatPlans[0] || pastSeatPlans[0] || seatPlans[0] || null;
  }

  getManagedSeatPlan(classId, room) {
    if (this.snapshot.activeSeatPlanId) {
      const activeSeatPlan = this.getAllSeatPlans().find(function (seatPlan) {
        return seatPlan.id === String(this.snapshot.activeSeatPlanId || "");
      }, this);

      if (activeSeatPlan && activeSeatPlan.classId === classId && activeSeatPlan.room === (room || "")) {
        return activeSeatPlan;
      }
    }

    return this.getCurrentSeatPlan(classId, room, this.getReferenceDate());
  }

  getAllSeatOrders() {
    return (this.snapshot.seatOrders || []).map(normalizeSeatOrder).sort(function (left, right) {
      return compareDateValues(right.validFrom, left.validFrom);
    });
  }

  getSeatOrdersForClass(classId) {
    return this.getAllSeatOrders().filter(function (seatOrder) {
      return seatOrder.classId === classId;
    });
  }

  getSeatOrdersForClassAndRoom(classId, room) {
    return this.getSeatOrdersForClass(classId).filter(function (seatOrder) {
      return (seatOrder.room || "") === (room || "");
    });
  }

  getCurrentSeatOrder(classId, room, date) {
    const effectiveDate = date || this.getReferenceDate();
    const todayValue = getLocalDateValue(effectiveDate);
    const seatOrders = this.getSeatOrdersForClassAndRoom(classId, room);
    const matchingSeatOrders = seatOrders.filter(function (seatOrder) {
      const validFrom = normalizeDateValue(seatOrder.validFrom);
      const validTo = normalizeDateValue(seatOrder.validTo);
      const startsBefore = !validFrom || compareDateValues(validFrom, todayValue) <= 0;
      const endsAfter = !validTo || compareDateValues(validTo, todayValue) >= 0;

      return startsBefore && endsAfter;
    }).sort(function (left, right) {
      return compareDateValues(right.validFrom, left.validFrom);
    });
    const futureSeatOrders = seatOrders.filter(function (seatOrder) {
      const validFrom = normalizeDateValue(seatOrder.validFrom);

      return validFrom && compareDateValues(validFrom, todayValue) > 0;
    }).sort(function (left, right) {
      return compareDateValues(left.validFrom, right.validFrom);
    });
    const pastSeatOrders = seatOrders.filter(function (seatOrder) {
      const validTo = normalizeDateValue(seatOrder.validTo);

      return validTo && compareDateValues(validTo, todayValue) < 0;
    }).sort(function (left, right) {
      return compareDateValues(right.validTo, left.validTo);
    });

    return matchingSeatOrders[0] || futureSeatOrders[0] || pastSeatOrders[0] || seatOrders[0] || null;
  }

  getManagedSeatOrder(classId, room) {
    if (this.snapshot.activeSeatOrderId) {
      const activeSeatOrder = this.getAllSeatOrders().find(function (seatOrder) {
        return seatOrder.id === String(this.snapshot.activeSeatOrderId || "");
      }, this);

      if (activeSeatOrder && activeSeatOrder.classId === classId && activeSeatOrder.room === (room || "")) {
        return activeSeatOrder;
      }
    }

    return this.getCurrentSeatOrder(classId, room, this.getReferenceDate());
  }

  getScheduledLessons(date) {
    const classesById = {};
    const lessons = [];

    this.snapshot.classes.forEach(function (schoolClass) {
      classesById[schoolClass.id] = schoolClass;
    });

    const currentTimetable = this.getCurrentTimetable(date);

    if (!currentTimetable) {
      return [];
    }

    this.getTimetableRows(currentTimetable).forEach(function (row) {
      WEEKDAY_KEYS.forEach(function (weekdayKey) {
        const cell = row.cells[weekdayKey];
        const classId = row.type === "lesson"
          ? (cell.isBlocked ? cell.inheritedClassId : cell.classId)
          : "";
        const schoolClass = classId ? classesById[classId] : null;

        if (!schoolClass) {
          return;
        }

        lessons.push({
          id: "timetable-" + weekdayKey + "-" + row.id,
          classId: schoolClass.id,
          subject: schoolClass.subject || "",
          room: cell.isBlocked ? (cell.inheritedRoom || schoolClass.room || "") : (cell.room || schoolClass.room || ""),
          weekday: Number(weekdayKey),
          startTime: row.startTime,
          endTime: row.endTime,
          topic: ""
        });
      });
    });

    return lessons.sort(function (left, right) {
      if (left.weekday !== right.weekday) {
        return left.weekday - right.weekday;
      }

      return timeToMinutes(left.startTime) - timeToMinutes(right.startTime);
    });
  }

  getAllClasses() {
    return this.snapshot.classes.slice();
  }

  getActiveClass() {
    if ((this.snapshot.activeDateTimeMode || "live") === "live") {
      const liveLesson = this.getMostRecentLesson(this.getReferenceDate());

      if (liveLesson) {
        return this.getClassById(liveLesson.classId);
      }
    }

    if (this.snapshot.activeClassId) {
      const activeClass = this.getClassById(this.snapshot.activeClassId);
      if (activeClass) {
        return activeClass;
      }
    }

    const currentLesson = this.getCurrentLesson(this.getReferenceDate());

    if (currentLesson) {
      return this.getClassById(currentLesson.classId);
    }

    return this.snapshot.classes[0] || null;
  }

  getMostRecentLesson(date) {
    const effectiveDate = date || this.getReferenceDate();
    const weekday = getCurrentWeekdayIndex(effectiveDate);
    const currentMinutes = (effectiveDate.getHours() * 60) + effectiveDate.getMinutes();
    const scheduledLessons = this.getScheduledLessons(effectiveDate);
    const pastLessons = scheduledLessons.filter(function (lesson) {
      if (lesson.weekday < weekday) {
        return true;
      }

      return lesson.weekday === weekday && timeToMinutes(lesson.startTime) <= currentMinutes;
    }).sort(function (left, right) {
      if (left.weekday !== right.weekday) {
        return right.weekday - left.weekday;
      }

      return timeToMinutes(right.startTime) - timeToMinutes(left.startTime);
    });

    return pastLessons[0] || scheduledLessons[scheduledLessons.length - 1] || null;
  }

  getCurrentLesson(date) {
    const effectiveDate = date || this.getReferenceDate();
    const weekday = getCurrentWeekdayIndex(effectiveDate);
    const currentMinutes = (effectiveDate.getHours() * 60) + effectiveDate.getMinutes();
    const scheduledLessons = this.getScheduledLessons(effectiveDate);

    return scheduledLessons.find(function (lesson) {
      const starts = timeToMinutes(lesson.startTime);
      const ends = timeToMinutes(lesson.endTime);
      return lesson.weekday === weekday && currentMinutes >= starts && currentMinutes <= ends;
    }) || this.getNextLesson(effectiveDate);
  }

  getCurrentLessonForClass(classId, date) {
    const effectiveDate = date || this.getReferenceDate();
    const currentMinutes = (effectiveDate.getHours() * 60) + effectiveDate.getMinutes();

    return this.getLessonUnitsForClass(classId, effectiveDate).find(function (lessonUnit) {
      const starts = timeToMinutes(lessonUnit.startTime);
      const ends = timeToMinutes(lessonUnit.endTime);

      return currentMinutes >= starts && currentMinutes <= ends;
    }) || null;
  }

  getRelevantLessonForClass(classId, date) {
    const effectiveDate = date || this.getReferenceDate();
    const weekday = getCurrentWeekdayIndex(effectiveDate);
    const currentMinutes = (effectiveDate.getHours() * 60) + effectiveDate.getMinutes();
    const classLessons = this.getLessonUnitsForClass(classId, effectiveDate);
    const currentLesson = classLessons.find(function (lesson) {
      const starts = timeToMinutes(lesson.startTime);
      const ends = timeToMinutes(lesson.endTime);
      return lesson.weekday === weekday && currentMinutes >= starts && currentMinutes <= ends;
    });

    if (currentLesson) {
      return currentLesson;
    }

    const startedLessons = classLessons
      .filter(function (lesson) {
        return lesson.weekday === weekday && timeToMinutes(lesson.startTime) <= currentMinutes;
      })
      .sort(function (left, right) {
        return timeToMinutes(right.startTime) - timeToMinutes(left.startTime);
      });
    const upcomingLessons = classLessons
      .filter(function (lesson) {
        return lesson.weekday === weekday && timeToMinutes(lesson.startTime) > currentMinutes;
      })
      .sort(function (left, right) {
        return timeToMinutes(left.startTime) - timeToMinutes(right.startTime);
      });
    const pastLessons = classLessons
      .filter(function (lesson) {
        return lesson.weekday < weekday;
      })
      .sort(function (left, right) {
        if (left.weekday !== right.weekday) {
          return right.weekday - left.weekday;
        }

        return timeToMinutes(right.startTime) - timeToMinutes(left.startTime);
      });
    const futureLessons = classLessons
      .filter(function (lesson) {
        return lesson.weekday > weekday;
      })
      .sort(function (left, right) {
        if (left.weekday !== right.weekday) {
          return left.weekday - right.weekday;
        }

        return timeToMinutes(left.startTime) - timeToMinutes(right.startTime);
      });

    return startedLessons[0] || upcomingLessons[0] || pastLessons[0] || futureLessons[0] || null;
  }

  getLessonUnitsForClass(classId, date) {
    const effectiveDate = date || this.getReferenceDate();
    const weekdayKey = String(getCurrentWeekdayIndex(effectiveDate));
    const currentTimetable = this.getCurrentTimetable(effectiveDate);
    const activeClass = this.getClassById(classId);
    const unitsBySourceRowId = {};

    if (!currentTimetable) {
      return [];
    }

    this.getTimetableRows(currentTimetable).forEach(function (row) {
      const cell = row.cells[weekdayKey] || normalizeDayEntry();
      const effectiveClassId = row.type === "lesson"
        ? (cell.isBlocked ? cell.inheritedClassId : cell.classId)
        : (cell.isBlocked ? cell.inheritedClassId : "");
      const effectiveRoom = row.type === "lesson"
        ? (cell.isBlocked ? cell.inheritedRoom : cell.room)
        : (cell.isBlocked ? cell.inheritedRoom : "");
      const sourceRowId = cell.isBlocked ? (cell.sourceRowId || row.id) : (row.type === "lesson" ? row.id : "");
      let lessonUnit;

      if (effectiveClassId !== classId || !sourceRowId) {
        return;
      }

      lessonUnit = unitsBySourceRowId[sourceRowId];

      if (!lessonUnit) {
        lessonUnit = {
          id: "timetable-" + weekdayKey + "-" + sourceRowId,
          sourceRowId: sourceRowId,
          classId: classId,
          subject: activeClass ? (activeClass.subject || "") : "",
          room: effectiveRoom || (activeClass ? (activeClass.room || "") : ""),
          weekday: Number(weekdayKey),
          startTime: row.startTime,
          endTime: row.endTime,
          topic: ""
        };
        unitsBySourceRowId[sourceRowId] = lessonUnit;
      } else {
        lessonUnit.endTime = row.endTime;
        if (!lessonUnit.room && effectiveRoom) {
          lessonUnit.room = effectiveRoom;
        }
      }
    });

    return Object.keys(unitsBySourceRowId).map(function (sourceRowId) {
      return unitsBySourceRowId[sourceRowId];
    }).sort(function (left, right) {
      if (left.weekday !== right.weekday) {
        return left.weekday - right.weekday;
      }

      return timeToMinutes(left.startTime) - timeToMinutes(right.startTime);
    });
  }

  getAllAttendanceRecords() {
    return (this.snapshot.attendanceRecords || []).map(normalizeAttendanceRecord);
  }

  getAllHomeworkRecords() {
    return (this.snapshot.homeworkRecords || []).map(normalizeHomeworkRecord);
  }

  getAllWarningRecords() {
    return (this.snapshot.warningRecords || []).map(normalizeWarningRecord);
  }

  getAttendanceRecordsForLessonOccurrence(classId, lessonId, lessonDate, studentId) {
    return this.getAllAttendanceRecords().filter(function (record) {
      const matchesClass = record.classId === classId;
      const matchesLesson = record.lessonId === lessonId;
      const matchesDate = normalizeDateValue(record.lessonDate) === normalizeDateValue(lessonDate);
      const matchesStudent = !studentId || record.studentId === studentId;

      return matchesClass && matchesLesson && matchesDate && matchesStudent;
    }).sort(function (left, right) {
      const leftKey = String(left.effectiveAt || left.recordedAt || "");
      const rightKey = String(right.effectiveAt || right.recordedAt || "");

      if (leftKey === rightKey) {
        return String(left.id || "").localeCompare(String(right.id || ""));
      }

      return leftKey.localeCompare(rightKey);
    });
  }

  getAttendanceContextForClass(classId, date) {
    const effectiveDate = date || this.getReferenceDate();
    const lesson = this.getCurrentLessonForClass(classId, effectiveDate);
    const lessonDate = getLocalDateValue(effectiveDate);
    const room = this.getRelevantRoomForClass(classId, effectiveDate) || "";

    if (!lesson) {
      return null;
    }

    return {
      id: lesson.id,
      classId: classId,
      lessonDate: lessonDate,
      room: lesson.room || room || "",
      startTime: lesson.startTime || "",
      isFallback: false
    };
  }

  getAttendanceStateForStudent(studentId, classId, date) {
    const effectiveDate = date || this.getReferenceDate();
    const context = this.getAttendanceContextForClass(classId, effectiveDate);
    let records;

    if (!context) {
      return "present";
    }

    records = this.getAttendanceRecordsForLessonOccurrence(classId, context.id, context.lessonDate, studentId);
    return records.length && records[records.length - 1].status === "absent" ? "absent" : "present";
  }

  getHomeworkRecordsForLessonOccurrence(classId, lessonId, lessonDate, studentId) {
    return this.getAllHomeworkRecords().filter(function (record) {
      const matchesClass = record.classId === classId;
      const matchesLesson = record.lessonId === lessonId;
      const matchesDate = normalizeDateValue(record.lessonDate) === normalizeDateValue(lessonDate);
      const matchesStudent = !studentId || record.studentId === studentId;

      return matchesClass && matchesLesson && matchesDate && matchesStudent;
    }).sort(function (left, right) {
      return String(left.recordedAt || "").localeCompare(String(right.recordedAt || ""));
    });
  }

  getWarningRecordsForLessonOccurrence(classId, lessonId, lessonDate, studentId) {
    return this.getAllWarningRecords().filter(function (record) {
      const matchesClass = record.classId === classId;
      const matchesLesson = record.lessonId === lessonId;
      const matchesDate = normalizeDateValue(record.lessonDate) === normalizeDateValue(lessonDate);
      const matchesStudent = !studentId || record.studentId === studentId;

      return matchesClass && matchesLesson && matchesDate && matchesStudent;
    }).sort(function (left, right) {
      return String(left.recordedAt || "").localeCompare(String(right.recordedAt || ""));
    });
  }

  getHomeworkStateForStudent(studentId, classId, date) {
    const effectiveDate = date || this.getReferenceDate();
    const context = this.getAttendanceContextForClass(classId, effectiveDate);
    const records = context
      ? this.getHomeworkRecordsForLessonOccurrence(classId, context.id, context.lessonDate, studentId)
      : [];

    if (!context) {
      return "vorhanden";
    }

    return records.length
      ? String(records[records.length - 1].quality || "fehlt")
      : "vorhanden";
  }

  getWarningCountForStudent(studentId, classId, date) {
    const effectiveDate = date || this.getReferenceDate();
    const context = this.getAttendanceContextForClass(classId, effectiveDate);

    if (!context) {
      return 0;
    }

    return this.getWarningRecordsForLessonOccurrence(classId, context.id, context.lessonDate, studentId).length;
  }

  getNextLesson(date) {
    const effectiveDate = date || this.getReferenceDate();
    const weekday = getCurrentWeekdayIndex(effectiveDate);
    const currentMinutes = (effectiveDate.getHours() * 60) + effectiveDate.getMinutes();
    const scheduledLessons = this.getScheduledLessons(effectiveDate);
    const futureLessons = scheduledLessons
      .filter(function (lesson) {
        if (lesson.weekday > weekday) {
          return true;
        }

        return lesson.weekday === weekday && timeToMinutes(lesson.startTime) >= currentMinutes;
      })
      .sort(function (left, right) {
        if (left.weekday !== right.weekday) {
          return left.weekday - right.weekday;
        }

        return timeToMinutes(left.startTime) - timeToMinutes(right.startTime);
      });

    return futureLessons[0] || scheduledLessons[0] || this.snapshot.lessons[0] || null;
  }

  getClassById(classId) {
    return this.snapshot.classes.find(function (schoolClass) {
      return schoolClass.id === classId;
    }) || null;
  }

  getStudentsForClass(classId) {
    const schoolClass = this.getClassById(classId);
    if (!schoolClass) {
      return [];
    }

    return this.snapshot.students.filter(function (student) {
      return schoolClass.studentIds.includes(student.id);
    });
  }

  getAssessmentsForClass(classId) {
    return this.snapshot.assessments.filter(function (assessment) {
      return assessment.classId === classId;
    });
  }

  getAssessmentStatusForStudent(studentId, classId, date) {
    const effectiveDate = date || this.getReferenceDate();
    const context = this.getAttendanceContextForClass(classId, effectiveDate);
    const assessments = this.getAssessmentsForClass(classId).filter(function (assessment) {
      return assessment.studentId === studentId;
    });
    const currentCount = context
      ? assessments.filter(function (assessment) {
        return String(assessment.lessonId || "") === String(context.id || "")
          && normalizeDateValue(assessment.lessonDate || assessment.date) === normalizeDateValue(context.lessonDate);
      }).length
      : 0;
    const lastAssessment = assessments
      .slice()
      .sort(function (left, right) {
        return String(right.recordedAt || right.lessonDate || right.date || "")
          .localeCompare(String(left.recordedAt || left.lessonDate || left.date || ""));
      })[0] || null;
    let isOlderThanFourteenDays = true;
    let lastDate = null;

    if (lastAssessment) {
      lastDate = new Date(String(lastAssessment.recordedAt || lastAssessment.lessonDate || lastAssessment.date || "").slice(0, 10) + "T00:00");
      if (!Number.isNaN(lastDate.getTime())) {
        isOlderThanFourteenDays = (effectiveDate.getTime() - lastDate.getTime()) > (14 * 24 * 60 * 60 * 1000);
      }
    }

    return {
      currentCount: currentCount,
      hasCurrentAssessment: currentCount > 0,
      isOlderThanFourteenDays: isOlderThanFourteenDays,
      hasAnyAssessment: Boolean(lastAssessment)
    };
  }

  getAssessmentCountForStudent(studentId, classId, date) {
    if (!studentId) {
      return 0;
    }

    return this.getAssessmentStatusForStudent(studentId, classId, date).currentCount;
  }

  isLastAssessmentOlderThanDays(studentId, classId, date, days) {
    const effectiveDate = date || this.getReferenceDate();
    const thresholdDays = Number(days) || 14;
    const lastAssessment = this.getAssessmentsForClass(classId)
      .filter(function (assessment) {
        return assessment.studentId === studentId;
      })
      .sort(function (left, right) {
        return String(right.lessonDate || right.date || "").localeCompare(String(left.lessonDate || left.date || ""));
      })[0] || null;
    let lastDate;

    if (!lastAssessment) {
      return true;
    }

    lastDate = new Date(String(lastAssessment.lessonDate || lastAssessment.date || "").slice(0, 10) + "T00:00");

    if (Number.isNaN(lastDate.getTime())) {
      return true;
    }

    return (effectiveDate.getTime() - lastDate.getTime()) > (thresholdDays * 24 * 60 * 60 * 1000);
  }

  getSeatPlanForClass(classId) {
    const room = (this.snapshot.activeDateTimeMode || "live") === "live"
      ? this.getLiveRoomForClass(classId, this.getReferenceDate())
      : (this.snapshot.activeSeatPlanRoom || this.getRelevantRoomForClass(classId, this.getReferenceDate()) || "");

    return this.getCurrentSeatPlan(classId, room, this.getReferenceDate());
  }

  getOpenTodosForClass(classId) {
    return this.snapshot.todos.filter(function (todo) {
      return todo.relatedClassId === classId && !todo.done;
    });
  }

  getAverageAchievement(classId) {
    const assessments = this.getAssessmentsForClass(classId);
    if (!assessments.length) {
      return null;
    }

    const sum = assessments.reduce(function (total, assessment) {
      const maxScore = Number(assessment && assessment.maxScore) || 0;
      const score = Number(assessment && assessment.score) || 0;
      return total + (maxScore ? Math.round((score / maxScore) * 100) : 0);
    }, 0);
    return Math.round(sum / assessments.length);
  }

  getClassSummary(classId) {
    const students = this.getStudentsForClass(classId);
    const seatPlan = this.getSeatPlanForClass(classId);
    const openTodos = this.getOpenTodosForClass(classId);

    return {
      studentCount: students.length,
      gapsCount: students.reduce(function (total, student) {
        return total + student.gaps.length;
      }, 0),
      averageAttendance: students.length
        ? Math.round((students.reduce(function (total, student) {
            return total + student.attendanceRate;
          }, 0) / students.length) * 100)
        : 0,
      averageAchievement: this.getAverageAchievement(classId),
      openTodos: openTodos.length,
      seatPlanUpdatedAt: seatPlan ? seatPlan.updatedAt : "nicht vorhanden"
    };
  }
}
