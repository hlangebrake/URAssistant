window.Unterrichtsassistent = window.Unterrichtsassistent || {};
window.Unterrichtsassistent.ui = window.Unterrichtsassistent.ui || {};
window.Unterrichtsassistent.ui.views = window.Unterrichtsassistent.ui.views || {};

window.Unterrichtsassistent.ui.views.unterricht = {
  id: "unterricht",
  title: "Unterricht",
  render: function (service) {
    const activeClass = service.getActiveClass();
    const viewMode = window.UnterrichtsassistentApp && typeof window.UnterrichtsassistentApp.getUnterrichtViewMode === "function"
      ? window.UnterrichtsassistentApp.getUnterrichtViewMode()
      : "live";
    const toolMode = window.UnterrichtsassistentApp && typeof window.UnterrichtsassistentApp.getUnterrichtToolMode === "function"
      ? window.UnterrichtsassistentApp.getUnterrichtToolMode()
      : "attendance";
    const currentClassLesson = activeClass && typeof service.getCurrentLessonForClass === "function"
      ? service.getCurrentLessonForClass(activeClass.id, service.getReferenceDate())
      : null;
    const activeDateTimeMode = service && service.snapshot
      ? String(service.snapshot.activeDateTimeMode || "live")
      : "live";
    const activeRoom = activeClass ? service.getRelevantRoomForClass(activeClass.id, service.getReferenceDate()) : "";
    const currentSeatOrder = activeClass && typeof service.getCurrentSeatOrder === "function"
      ? service.getCurrentSeatOrder(activeClass.id, activeRoom, service.getReferenceDate())
      : null;
    const currentSeatPlan = activeClass
      ? service.getCurrentSeatPlan(activeClass.id, activeRoom, service.getReferenceDate())
      : null;
    const students = activeClass ? service.getStudentsForClass(activeClass.id) : [];
    const deskLayoutItemsSource = currentSeatPlan && Array.isArray(currentSeatPlan.deskLayoutItems)
      ? currentSeatPlan.deskLayoutItems
      : [];
    const deskLayoutItems = deskLayoutItemsSource.filter(function (item) {
      return item && ["single", "double"].indexOf(String(item.type || "")) >= 0;
    });
    const seatAssignments = currentSeatOrder && Array.isArray(currentSeatOrder.seats)
      ? currentSeatOrder.seats
      : [];

    function escapeValue(value) {
      return String(value || "")
        .replace(/&/g, "&amp;")
        .replace(/\\/g, "&#92;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#39;")
        .replace(/`/g, "&#96;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/\r/g, "&#13;")
        .replace(/\n/g, "&#10;");
    }

    function getStudentById(studentId) {
      return students.find(function (student) {
        return student.id === studentId;
      }) || null;
    }

    function getStudentShortLabel(student) {
      const firstName = String(student && student.firstName || "").trim();
      const lastName = String(student && student.lastName || "").trim();
      const lastInitial = lastName ? lastName.charAt(0).toUpperCase() + "." : "";
      const hasDuplicateFirstName = students.filter(function (entry) {
        return String(entry && entry.firstName || "").trim() === firstName;
      }).length > 1;

      return hasDuplicateFirstName
        ? [firstName, lastInitial].join(" ").trim()
        : firstName;
    }

    function getSeatAssignmentByDeskSlot(deskItemId, slotName) {
      return seatAssignments.find(function (seat) {
        return seat.deskItemId === deskItemId && seat.slot === slotName;
      }) || null;
    }

    function getAttendanceStateForStudent(studentId) {
      if (!studentId || !activeClass || typeof service.getAttendanceStateForStudent !== "function") {
        return "present";
      }

      return service.getAttendanceStateForStudent(studentId, activeClass.id, service.getReferenceDate());
    }

    function getHomeworkStateForStudent(studentId) {
      if (!studentId || !activeClass || typeof service.getHomeworkStateForStudent !== "function") {
        return "vorhanden";
      }

      return service.getHomeworkStateForStudent(studentId, activeClass.id, service.getReferenceDate());
    }

    function getHomeworkBadgeClass(homeworkState) {
      if (["fehlt", "unvollstaendig", "abgeschrieben"].indexOf(homeworkState) >= 0) {
        return "is-missing";
      }

      if (homeworkState === "besondersgut") {
        return "is-excellent";
      }

      return "is-done";
    }

    function getToolButtonClass(toolKey) {
      return toolMode === toolKey
        ? "unterricht-seatplan-action is-active"
        : "unterricht-seatplan-action";
    }

    function getWarningCountForStudent(studentId) {
      if (!studentId || !activeClass || typeof service.getWarningCountForStudent !== "function") {
        return 0;
      }

      return service.getWarningCountForStudent(studentId, activeClass.id, service.getReferenceDate());
    }

    function getAssessmentStatusForStudent(studentId) {
      if (!studentId || !activeClass || typeof service.getAssessmentStatusForStudent !== "function") {
        return {
          currentCount: 0,
          hasCurrentAssessment: false,
          isOlderThanFourteenDays: true
        };
      }

      return service.getAssessmentStatusForStudent(studentId, activeClass.id, service.getReferenceDate());
    }

    function renderReadonlySeatSlot(student, extraClasses) {
      const classes = ["seat-order-slot", "unterricht-seatplan-slot"];
      const attendanceState = student ? getAttendanceStateForStudent(student.id) : "present";
      const showStatusInfo = attendanceState !== "absent";
      const homeworkState = student ? getHomeworkStateForStudent(student.id) : "vorhanden";
      const warningCount = student ? getWarningCountForStudent(student.id) : 0;
      const assessmentStatus = student ? getAssessmentStatusForStudent(student.id) : {
        currentCount: 0,
        hasCurrentAssessment: false,
        isOlderThanFourteenDays: false
      };
      const assessmentCount = assessmentStatus.currentCount;
      const assessmentStateClass = assessmentStatus.hasCurrentAssessment
        ? "is-positive"
        : (assessmentStatus.isOlderThanFourteenDays ? "is-overdue" : "is-empty");
      const isAttendanceInteractive = Boolean(student && currentClassLesson && toolMode === "attendance");
      const isHomeworkInteractive = Boolean(student && currentClassLesson && toolMode === "homework" && attendanceState !== "absent");
      const isWarningInteractive = Boolean(student && currentClassLesson && toolMode === "warning" && attendanceState !== "absent");
      const isAssessmentInteractive = Boolean(student && currentClassLesson && toolMode === "assessment" && attendanceState !== "absent");
      const isInteractive = isAttendanceInteractive || isHomeworkInteractive || isWarningInteractive || isAssessmentInteractive;
      const onclick = isAttendanceInteractive
        ? ' onclick="return window.UnterrichtsassistentApp.handleUnterrichtSeatClick(\'' + escapeValue(student.id) + '\', \'' + escapeValue(currentClassLesson.id) + '\', \'' + escapeValue(currentClassLesson.startTime || "") + '\', \'' + escapeValue(currentClassLesson.room || "") + '\')"'
        : "";
      const pointerdown = isHomeworkInteractive
        ? ' onpointerdown="return window.UnterrichtsassistentApp.startUnterrichtHomeworkPointer(event, \'' + escapeValue(student.id) + '\', \'' + escapeValue(currentClassLesson.id) + '\', \'' + escapeValue(currentClassLesson.startTime || "") + '\', \'' + escapeValue(currentClassLesson.room || "") + '\')" oncontextmenu="return false"'
        : "";
      const warningPointerdown = isWarningInteractive
        ? ' onpointerdown="return window.UnterrichtsassistentApp.startUnterrichtWarningPointer(event, \'' + escapeValue(student.id) + '\', \'' + escapeValue(currentClassLesson.id) + '\', \'' + escapeValue(currentClassLesson.startTime || "") + '\', \'' + escapeValue(currentClassLesson.room || "") + '\')" oncontextmenu="return false"'
        : "";
      const assessmentPointerdown = isAssessmentInteractive
        ? ' onpointerdown="return window.UnterrichtsassistentApp.startUnterrichtAssessmentPointer(event, \'' + escapeValue(student.id) + '\', \'' + escapeValue(currentClassLesson.id) + '\', \'' + escapeValue(currentClassLesson.startTime || "") + '\', \'' + escapeValue(currentClassLesson.room || "") + '\')" oncontextmenu="return false"'
        : "";
      const homeworkBadge = student && currentClassLesson && showStatusInfo
        ? '<span class="unterricht-seatplan-homework-badge ' + getHomeworkBadgeClass(homeworkState) + (toolMode === "homework" ? ' is-emphasized' : ' is-muted') + '">H</span>'
        : "";
      const warningBadge = showStatusInfo && warningCount > 0
        ? '<span class="unterricht-seatplan-warning-badge' + (toolMode === "warning" ? ' is-emphasized' : ' is-muted') + '">&#9888;<span class="unterricht-seatplan-warning-badge__count">' + escapeValue(String(warningCount)) + '</span></span>'
        : "";
      const assessmentBadge = student && currentClassLesson && showStatusInfo
        ? '<div class="unterricht-seatplan-assessment-count ' + assessmentStateClass + (toolMode === "assessment" ? ' is-emphasized' : ' is-muted') + '"><span class="unterricht-seatplan-assessment-count__icon">&#128269;</span><span class="unterricht-seatplan-assessment-count__value">' + escapeValue(String(assessmentCount)) + '</span></div>'
        : "";
      const symbolRow = (homeworkBadge || warningBadge)
        ? '<div class="unterricht-seatplan-symbol-row">' + homeworkBadge + warningBadge + '</div>'
        : "";

      if (extraClasses) {
        classes.push(extraClasses);
      }

      if (student) {
        classes.push("unterricht-seatplan-student");
        if (isInteractive) {
          classes.push("is-interactive");
        }
        classes.push("is-homework-" + getHomeworkBadgeClass(homeworkState).replace("is-", ""));
      } else {
        classes.push("seat-order-slot--readonly");
      }

      if (student && attendanceState === "absent") {
        classes.push(toolMode === "attendance" ? "is-absent" : "is-muted");
      }

      return '<div class="' + classes.join(" ") + '"' + onclick + pointerdown + warningPointerdown + assessmentPointerdown + '>' + assessmentBadge + (student ? '<span class="seat-order-desk__label seat-order-desk__label--readonly">' + escapeValue(getStudentShortLabel(student)) + "</span>" : "") + symbolRow + "</div>";
    }

    function getDeskItemMetrics(item) {
      const itemType = item && item.type === "double" ? "double" : "single";

      return {
        type: itemType,
        width: Number(item && item.width) || (itemType === "double" ? 156 : 88),
        height: Number(item && item.height) || 88
      };
    }

    function getDeskItemCenter(item, offsetX, offsetY) {
      const metrics = getDeskItemMetrics(item);

      return {
        x: (Number(item && item.x) || 0) - (Number(offsetX) || 0) + (metrics.width / 2),
        y: (Number(item && item.y) || 0) - (Number(offsetY) || 0) + (metrics.height / 2)
      };
    }

    function getSeatOrderReferenceTarget(item, offsetX, offsetY, canvasWidth, canvasHeight) {
      const targetItem = deskLayoutItemsSource.find(function (candidate) {
        return candidate && candidate.type === "tafel";
      }) || deskLayoutItemsSource.find(function (candidate) {
        return candidate && candidate.type === "pult";
      });
      const deskCenter = getDeskItemCenter(item, offsetX, offsetY);

      if (targetItem) {
        return getDeskItemCenter(targetItem, offsetX, offsetY);
      }

      return {
        x: deskCenter.x,
        y: Number(canvasHeight) || 0
      };
    }

    function getDeskBounds() {
      if (!deskLayoutItems.length) {
        return null;
      }

      return deskLayoutItems.reduce(function (bounds, item) {
        const metrics = getDeskItemMetrics(item);
        const x = Number(item.x) || 0;
        const y = Number(item.y) || 0;

        return {
          minX: Math.min(bounds.minX, x),
          minY: Math.min(bounds.minY, y),
          maxX: Math.max(bounds.maxX, x + metrics.width),
          maxY: Math.max(bounds.maxY, y + metrics.height)
        };
      }, {
        minX: Infinity,
        minY: Infinity,
        maxX: 0,
        maxY: 0
      });
    }

    function getDoubleDeskSlotLayout(item, offsetX, offsetY, canvasWidth, canvasHeight) {
      const metrics = getDeskItemMetrics(item);
      const deskCenter = getDeskItemCenter(item, offsetX, offsetY);
      const targetPoint = getSeatOrderReferenceTarget(item, offsetX, offsetY, canvasWidth, canvasHeight);
      let facingX = (Number(targetPoint.x) || 0) - deskCenter.x;
      let facingY = (Number(targetPoint.y) || 0) - deskCenter.y;
      const longAxis = metrics.width >= metrics.height ? "horizontal" : "vertical";
      const leftVectorFallback = longAxis === "horizontal"
        ? { x: -1, y: 0 }
        : { x: 0, y: -1 };
      let leftVector;
      let orderedSlots;

      if (!facingX && !facingY) {
        facingY = 1;
      }

      leftVector = {
        x: facingY || leftVectorFallback.x,
        y: -facingX || leftVectorFallback.y
      };

      if (longAxis === "horizontal") {
        orderedSlots = leftVector.x <= 0 ? ["left", "right"] : ["right", "left"];
      } else {
        orderedSlots = leftVector.y <= 0 ? ["left", "right"] : ["right", "left"];
      }

      return {
        axis: longAxis,
        orderedSlots: orderedSlots
      };
    }

    function renderCompactSeatPlan() {
      const deskBounds = getDeskBounds();
      const padding = 18;
      const offsetX = deskBounds ? Math.max(Math.floor(deskBounds.minX) - padding, 0) : 0;
      const offsetY = deskBounds ? Math.max(Math.floor(deskBounds.minY) - padding, 0) : 0;
      const canvasWidth = deskBounds
        ? Math.max(Math.ceil(deskBounds.maxX - deskBounds.minX) + (padding * 2), 180)
        : 220;
      const canvasHeight = deskBounds
        ? Math.max(Math.ceil(deskBounds.maxY - deskBounds.minY) + (padding * 2), 180)
        : 220;
      const canvasStyle = "width:" + String(canvasWidth) + "px;height:" + String(canvasHeight) + "px";

      if (!activeClass) {
        return '<div class="seat-plan-placeholder">Noch keine aktive Lerngruppe vorhanden.</div>';
      }

      if (!currentSeatPlan || !currentSeatOrder) {
        return '<div class="seat-plan-placeholder">Fuer die aktuellen globalen Daten ist noch kein Sitzplan hinterlegt.</div>';
      }

      if (!deskLayoutItems.length) {
        return '<div class="seat-plan-placeholder">Die aktuelle Tischordnung enthaelt noch keine Tische.</div>';
      }

      return [
        '<div class="unterricht-seatplan">',
        '<div class="unterricht-seatplan-frame">',
        '<div class="desk-layout-builder desk-layout-builder--readonly desk-layout-builder--readonly-single">',
        '<div class="desk-layout-builder__canvas-wrap desk-layout-builder__canvas-wrap--readonly desk-layout-builder__canvas-wrap--tight desk-layout-builder__canvas-wrap--unterricht">',
        '<div class="unterricht-seatplan-canvas-anchor">',
        '<div class="desk-layout-builder__canvas desk-layout-builder__canvas--readonly desk-layout-builder__canvas--tight" style="', canvasStyle, '">',
        deskLayoutItems.map(function (item) {
          const metrics = getDeskItemMetrics(item);
          const inlineStyle = [
            "left:" + String((Number(item.x) || 0) - offsetX) + "px",
            "top:" + String((Number(item.y) || 0) - offsetY) + "px",
            "width:" + String(metrics.width) + "px",
            "height:" + String(metrics.height) + "px"
          ].join(";");

          if (metrics.type === "single") {
            const singleAssignment = getSeatAssignmentByDeskSlot(item.id, "single");
            const singleStudent = singleAssignment ? getStudentById(singleAssignment.studentId) : null;

            return '<div class="desk-layout-item desk-layout-item--single desk-layout-item--seat-order" style="' + inlineStyle + '"><div class="seat-order-slot-grid">' + renderReadonlySeatSlot(singleStudent, "") + "</div></div>";
          }

          {
            const doubleDeskLayout = getDoubleDeskSlotLayout(item, offsetX, offsetY, canvasWidth, canvasHeight);
            const slotGridClass = "seat-order-slot-grid seat-order-slot-grid--double seat-order-slot-grid--double-" + doubleDeskLayout.axis;
            const doubleSlotsHtml = doubleDeskLayout.orderedSlots.map(function (slotName, slotIndex) {
              const assignment = getSeatAssignmentByDeskSlot(item.id, slotName);
              const student = assignment ? getStudentById(assignment.studentId) : null;
              const positionClass = doubleDeskLayout.axis === "horizontal"
                ? (slotIndex === 0 ? "visual-left" : "visual-right")
                : (slotIndex === 0 ? "visual-top" : "visual-bottom");

              return renderReadonlySeatSlot(student, 'seat-order-slot--' + slotName + ' seat-order-slot--' + positionClass);
            }).join("");

            return '<div class="desk-layout-item desk-layout-item--double desk-layout-item--seat-order" style="' + inlineStyle + '"><div class="' + slotGridClass + '">' + doubleSlotsHtml + "</div></div>";
          }
        }).join(""),
        '</div>',
        '<div class="unterricht-seatplan-actions" aria-label="Unterrichtsaktionen">',
        '<button class="' + getToolButtonClass("attendance") + '" type="button" aria-label="Anwesenheit markieren" onclick="return window.UnterrichtsassistentApp.setUnterrichtToolMode(\'attendance\')">&#10003;</button>',
        '<button class="' + getToolButtonClass("homework") + '" type="button" aria-label="Hausaufgabe markieren" onclick="return window.UnterrichtsassistentApp.setUnterrichtToolMode(\'homework\')">H</button>',
        '<button class="' + getToolButtonClass("warning") + '" type="button" aria-label="Warnung vergeben" onclick="return window.UnterrichtsassistentApp.setUnterrichtToolMode(\'warning\')">&#9888;</button>',
        '<button class="' + getToolButtonClass("assessment") + '" type="button" aria-label="Bewertung oeffnen" onclick="return window.UnterrichtsassistentApp.setUnterrichtToolMode(\'assessment\')">&#128269;</button>',
        '</div>',
        '</div>',
        '</div>',
        '</div>',
        '</div>'
      ].join("");
    }

    function renderLiveNotice() {
      const classLabel = activeClass
        ? [String(activeClass.name || "").trim(), String(activeClass.subject || "").trim()].filter(Boolean).join(" ")
        : "die aktive Lerngruppe";

      if (!activeClass || currentClassLesson) {
        if (activeDateTimeMode !== "manual") {
          return "";
        }

        return '<div class="unterricht-live-notice unterricht-live-notice--manual" role="status">' + escapeValue("Warnung: Manuelle Zeitangabe") + "</div>";
      }

      return [
        '<div class="unterricht-live-notice" role="status">',
        '<div>', escapeValue(activeDateTimeMode === "live"
          ? "Kein Unterricht: " + classLabel
          : "Kein Unterricht: " + classLabel), '</div>',
        activeDateTimeMode === "manual"
          ? '<div class="unterricht-live-notice__subline">' + escapeValue("Warnung: Manuelle Zeitangabe") + '</div>'
          : "",
        '</div>'
      ].join("");
    }

    if (viewMode === "live") {
      return [
        '<div class="unterricht-layout unterricht-layout--live">',
        '<article class="panel unterricht-layout__seatplan unterricht-layout__seatplan--full">',
        renderLiveNotice(),
        renderCompactSeatPlan(),
        '<div class="import-modal" id="unterrichtWarningOtherModal" hidden>',
        '<div class="import-modal__backdrop" onclick="return window.UnterrichtsassistentApp.closeUnterrichtWarningOtherModal()"></div>',
        '<div class="import-modal__dialog" role="dialog" aria-modal="true" aria-labelledby="unterrichtWarningOtherTitle">',
        '<div class="import-modal__header">',
        '<h3 id="unterrichtWarningOtherTitle">Andere Verwarnung</h3>',
        '<button class="import-modal__close" type="button" aria-label="Pop-up schliessen" onclick="return window.UnterrichtsassistentApp.closeUnterrichtWarningOtherModal()">x</button>',
        '</div>',
        '<form class="import-modal__form" autocomplete="off" method="post" action="about:blank" data-local-only-form onsubmit="return window.UnterrichtsassistentApp.submitUnterrichtWarningOtherModal(event)">',
        '<label class="import-modal__field">',
        '<span>Kurztext</span>',
        '<input id="unterrichtWarningOtherInput" type="text" maxlength="120" placeholder="Kurzer Hinweis" autocomplete="off" autocapitalize="none" spellcheck="false">',
        '</label>',
        '<div class="import-modal__actions">',
        '<button class="circle-action circle-action--danger" type="button" onclick="return window.UnterrichtsassistentApp.closeUnterrichtWarningOtherModal()">Abbrechen</button>',
        '<button class="circle-action" type="submit">OK</button>',
        '</div>',
        '</form>',
        '</div>',
        '</div>',
        '<div class="import-modal" id="unterrichtAssessmentModal" hidden>',
        '<div class="import-modal__backdrop" onclick="return window.UnterrichtsassistentApp.closeUnterrichtAssessmentModal()"></div>',
        '<div class="import-modal__dialog import-modal__dialog--assessment" role="dialog" aria-modal="true" aria-labelledby="unterrichtAssessmentStudent">',
        '<div class="import-modal__header">',
        '<div>',
        '<h3 id="unterrichtAssessmentStudent">Schueler</h3>',
        '<div class="import-modal__meta" id="unterrichtAssessmentDate"></div>',
        '</div>',
        '<div class="import-modal__icon-actions">',
        '<button class="import-modal__icon-button import-modal__icon-button--confirm" type="submit" form="unterrichtAssessmentForm" aria-label="Bewertung uebernehmen">&#10003;</button>',
        '<button class="import-modal__icon-button import-modal__icon-button--cancel" type="button" aria-label="Bewertung verwerfen" onclick="return window.UnterrichtsassistentApp.closeUnterrichtAssessmentModal()">&#10005;</button>',
        '</div>',
        '</div>',
        '<form class="import-modal__form" id="unterrichtAssessmentForm" autocomplete="off" method="post" action="about:blank" data-local-only-form onsubmit="return window.UnterrichtsassistentApp.submitUnterrichtAssessmentModal(event)">',
        '<div class="assessment-columns">',
        '<section class="assessment-column">',
        '<h4 class="assessment-column__title">Leistung</h4>',
        '<div class="import-modal__field">',
        '<span>Kategorie</span>',
        '<div class="assessment-category-buttons" id="unterrichtAssessmentCategoryGroup">',
        '<button class="assessment-category-button" type="button" data-category="beitrag" onclick="return window.UnterrichtsassistentApp.toggleUnterrichtAssessmentCategory(\'beitrag\')">Beitrag</button>',
        '<button class="assessment-category-button" type="button" data-category="ueberpruefung" onclick="return window.UnterrichtsassistentApp.toggleUnterrichtAssessmentCategory(\'ueberpruefung\')">Ueberpruefung</button>',
        '<button class="assessment-category-button" type="button" data-category="praesentation" onclick="return window.UnterrichtsassistentApp.toggleUnterrichtAssessmentCategory(\'praesentation\')">Praesentation</button>',
        '<button class="assessment-category-button" type="button" data-category="abgabe" onclick="return window.UnterrichtsassistentApp.toggleUnterrichtAssessmentCategory(\'abgabe\')">Abgabe</button>',
        '</div>',
        '<input id="unterrichtAssessmentCategory" type="hidden" value="">',
        '</div>',
        '<div class="import-modal__field">',
        '<span>AFB-Bewertung</span>',
        '<div class="assessment-grid-chart" id="unterrichtAssessmentGrid" onpointerdown="return window.UnterrichtsassistentApp.startUnterrichtAssessmentGridPointer(event)" onpointermove="return window.UnterrichtsassistentApp.handleUnterrichtAssessmentGridPointerMove(event)" onpointerup="return window.UnterrichtsassistentApp.handleUnterrichtAssessmentGridPointerUp(event)" onpointercancel="return window.UnterrichtsassistentApp.handleUnterrichtAssessmentGridPointerUp(event)">',
        '<svg class="assessment-grid-chart__svg" id="unterrichtAssessmentGridSvg" viewBox="0 0 360 260" role="img" aria-label="AFB Bewertungsraster"></svg>',
        '</div>',
        '<div class="assessment-grid-chart__hint">Klick oder Drag ueber das Raster</div>',
        '<input id="unterrichtAssessmentAfb1" type="hidden" value="">',
        '<input id="unterrichtAssessmentAfb2" type="hidden" value="">',
        '<input id="unterrichtAssessmentAfb3" type="hidden" value="">',
        '</div>',
        '</section>',
        '<section class="assessment-column">',
        '<h4 class="assessment-column__title">Verhalten</h4>',
        '<div class="assessment-behavior-grid">',
        '<div class="import-modal__field">',
        '<span>AV</span>',
        '<div class="assessment-grade-buttons assessment-grade-buttons--vertical">',
        '<button class="assessment-grade-button" type="button" data-target="work" data-value="a" onclick="return window.UnterrichtsassistentApp.toggleUnterrichtAssessmentGrade(\'work\', \'a\')">a</button>',
        '<button class="assessment-grade-button" type="button" data-target="work" data-value="b" onclick="return window.UnterrichtsassistentApp.toggleUnterrichtAssessmentGrade(\'work\', \'b\')">b</button>',
        '<button class="assessment-grade-button" type="button" data-target="work" data-value="c" onclick="return window.UnterrichtsassistentApp.toggleUnterrichtAssessmentGrade(\'work\', \'c\')">c</button>',
        '<button class="assessment-grade-button" type="button" data-target="work" data-value="d" onclick="return window.UnterrichtsassistentApp.toggleUnterrichtAssessmentGrade(\'work\', \'d\')">d</button>',
        '</div>',
        '<input id="unterrichtAssessmentWorkBehavior" type="hidden" value="">',
        '</div>',
        '<div class="import-modal__field">',
        '<span>SV</span>',
        '<div class="assessment-grade-buttons assessment-grade-buttons--vertical">',
        '<button class="assessment-grade-button" type="button" data-target="social" data-value="a" onclick="return window.UnterrichtsassistentApp.toggleUnterrichtAssessmentGrade(\'social\', \'a\')">a</button>',
        '<button class="assessment-grade-button" type="button" data-target="social" data-value="b" onclick="return window.UnterrichtsassistentApp.toggleUnterrichtAssessmentGrade(\'social\', \'b\')">b</button>',
        '<button class="assessment-grade-button" type="button" data-target="social" data-value="c" onclick="return window.UnterrichtsassistentApp.toggleUnterrichtAssessmentGrade(\'social\', \'c\')">c</button>',
        '<button class="assessment-grade-button" type="button" data-target="social" data-value="d" onclick="return window.UnterrichtsassistentApp.toggleUnterrichtAssessmentGrade(\'social\', \'d\')">d</button>',
        '</div>',
        '<input id="unterrichtAssessmentSocialBehavior" type="hidden" value="">',
        '</div>',
        '</div>',
        '</section>',
        '<section class="assessment-column">',
        '<h4 class="assessment-column__title">Fachwissen</h4>',
        '<label class="import-modal__field import-modal__field--knowledge-gap">',
        '<span>Wissensluecke</span>',
        '<input id="unterrichtAssessmentKnowledgeGap" type="text" maxlength="180" placeholder="Diagnostizierte Wissensluecke" autocomplete="off" autocapitalize="none" spellcheck="false" onfocus="return window.UnterrichtsassistentApp.handleKnowledgeGapInputFocus(\'unterrichtAssessmentKnowledgeGap\', \'unterrichtAssessmentKnowledgeGapSuggestions\')" oninput="return window.UnterrichtsassistentApp.handleKnowledgeGapInput(event, \'unterrichtAssessmentKnowledgeGapSuggestions\')" onblur="return window.UnterrichtsassistentApp.handleKnowledgeGapInputBlur(\'unterrichtAssessmentKnowledgeGapSuggestions\')">',
        '<div class="knowledge-gap-suggestions" id="unterrichtAssessmentKnowledgeGapSuggestions" hidden onpointerdown="return window.UnterrichtsassistentApp.handleKnowledgeGapSuggestionsPointerDown(event, \'unterrichtAssessmentKnowledgeGapSuggestions\')" onpointermove="return window.UnterrichtsassistentApp.handleKnowledgeGapSuggestionsPointerMove(event, \'unterrichtAssessmentKnowledgeGapSuggestions\')" onpointerup="return window.UnterrichtsassistentApp.handleKnowledgeGapSuggestionsPointerUp(event, \'unterrichtAssessmentKnowledgeGapSuggestions\')" onpointercancel="return window.UnterrichtsassistentApp.handleKnowledgeGapSuggestionsPointerUp(event, \'unterrichtAssessmentKnowledgeGapSuggestions\')"></div>',
        '</label>',
        '<label class="import-modal__field">',
        '<span>Notiz</span>',
        '<input id="unterrichtAssessmentNote" type="text" maxlength="240" placeholder="Freie Notiz zur Bewertung" autocomplete="off" autocapitalize="none" spellcheck="false">',
        '</label>',
        '</section>',
        '</div>',
        '</form>',
        '</div>',
        '</article>',
        '</div>'
      ].join("");
    }

    return [
      '<div class="unterricht-layout">',
      '<article class="panel unterricht-layout__seatplan unterricht-layout__seatplan--full">',
      renderCompactSeatPlan(),
      '</article>',
      '<article class="panel unterricht-layout__content">',
      '<div class="seat-plan-placeholder">', escapeValue(viewMode === "nachpflege" ? "Nachpflege folgt als naechstes." : (viewMode === "analyse" ? "Analyse folgt als naechstes." : "Live-Unterrichtsbereich folgt als naechstes.")), '</div>',
      '</article>',
      '</div>'
    ].join("");
  }
};


/* --- src\ui\views\klasseView.js --- */
window.Unterrichtsassistent = window.Unterrichtsassistent || {};
window.Unterrichtsassistent.ui = window.Unterrichtsassistent.ui || {};
window.Unterrichtsassistent.ui.views = window.Unterrichtsassistent.ui.views || {};

window.Unterrichtsassistent.ui.views.klasse = {
  id: "klasse",
  title: "Lerngruppe",
  getSubtitle: function (service) {
    const schoolClass = service.getActiveClass();

    if (!schoolClass) {
      return "";
    }

window.Unterrichtsassistent.ui.views = window.Unterrichtsassistent.ui.views || {};

window.Unterrichtsassistent.ui.views.stundenplan = {
  id: "stundenplan",
  title: "Stundenplan",
  render: function (service) {
    const viewMode = window.UnterrichtsassistentApp && typeof window.UnterrichtsassistentApp.getTimetableViewMode === "function"
      ? window.UnterrichtsassistentApp.getTimetableViewMode()
      : "ansicht";
    const isManageMode = viewMode === "verwalten";
    const referenceDate = service.getReferenceDate();
    const timetable = isManageMode ? service.getManagedTimetable() : service.getCurrentTimetable(referenceDate);
    const rows = timetable ? service.getTimetableRows(timetable) : [];
    const weekdays = service.getWeekdays();
    const classes = service.getAllClasses();

    function escapeValue(value) {
      return String(value || "")
        .replace(/&/g, "&amp;")
        .replace(/\\/g, "&#92;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#39;")
        .replace(/`/g, "&#96;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/\r/g, "&#13;")
        .replace(/\n/g, "&#10;");
    }

    function timeToMinutes(timeValue) {
      const parts = String(timeValue || "").split(":");
      const hours = Number(parts[0]);
      const minutes = Number(parts[1]);

      if (parts.length !== 2 || Number.isNaN(hours) || Number.isNaN(minutes)) {
        return 0;
      }

      return (hours * 60) + minutes;
    }

    function getWeekDates() {
      const today = new Date(referenceDate);
      const currentDay = today.getDay();
      const distanceToMonday = currentDay === 0 ? -6 : 1 - currentDay;
      const monday = new Date(today);
      const datesByKey = {};

      monday.setHours(0, 0, 0, 0);
      monday.setDate(today.getDate() + distanceToMonday);

      weekdays.forEach(function (weekday, index) {
        const date = new Date(monday);
        date.setDate(monday.getDate() + index);
        const isoDate = date.getFullYear() + "-" + String(date.getMonth() + 1).padStart(2, "0") + "-" + String(date.getDate()).padStart(2, "0");
        datesByKey[weekday.key] = {
          label: String(date.getDate()).padStart(2, "0") + "." + String(date.getMonth() + 1).padStart(2, "0") + ".",
          isoDate: isoDate
        };
      });

      return datesByKey;
    }

    function formatDateValue(dateValue) {
      if (!dateValue) {
        return "";
      }

      return String(dateValue).slice(0, 10);
    }

    function getClassDisplayName(schoolClass) {
      return [schoolClass.name || "", schoolClass.subject || ""].join(" ").trim();
    }

    function getClassById(classId) {
      return classes.find(function (schoolClass) {
        return schoolClass.id === classId;
      }) || null;
    }

    function getClassDisplayColor(schoolClass) {
      if (window.UnterrichtsassistentApp && typeof window.UnterrichtsassistentApp.getClassDisplayColor === "function") {
        return window.UnterrichtsassistentApp.getClassDisplayColor(schoolClass);
      }

      return "#d9d4cb";
    }

    function hexToRgb(hexColor) {
      const normalized = String(hexColor || "").replace("#", "");
      const fullHex = normalized.length === 3
        ? normalized.split("").map(function (char) {
            return char + char;
          }).join("")
        : normalized;

      return {
        r: parseInt(fullHex.slice(0, 2), 16),
        g: parseInt(fullHex.slice(2, 4), 16),
        b: parseInt(fullHex.slice(4, 6), 16)
      };
    }

    function buildLessonBoxStyle(schoolClass) {
      const color = getClassDisplayColor(schoolClass);
      const rgb = hexToRgb(color);

      return [
        "background: linear-gradient(180deg, rgba(" + rgb.r + ", " + rgb.g + ", " + rgb.b + ", 0.98), rgba(" + rgb.r + ", " + rgb.g + ", " + rgb.b + ", 0.88));",
        "box-shadow: 0 16px 32px rgba(" + rgb.r + ", " + rgb.g + ", " + rgb.b + ", 0.22);",
        "border: 1px solid rgba(" + Math.max(rgb.r - 30, 0) + ", " + Math.max(rgb.g - 30, 0) + ", " + Math.max(rgb.b - 30, 0) + ", 0.3);",
        "color: var(--text);"
      ].join(" ");
    }

    function renderClassOptions(selectedClassId) {
      return ['<option value="">-</option>'].concat(classes.map(function (schoolClass) {
        return '<option value="' + escapeValue(schoolClass.id) + '"' + (selectedClassId === schoolClass.id ? " selected" : "") + '>' + escapeValue(getClassDisplayName(schoolClass)) + "</option>";
      })).join("");
    }

    function countCellRowspan(lessonRows, startRowIndex, weekdayKey) {
      let span = 1;
      let nextIndex;

      for (nextIndex = startRowIndex + 1; nextIndex < lessonRows.length; nextIndex += 1) {
        if (lessonRows[nextIndex].cells[weekdayKey].sourceRowId === lessonRows[startRowIndex].id) {
          span += 1;
        } else {
          break;
        }
      }

      return span;
    }

    function renderManageDayCell(row, weekday) {
      const cell = row.cells[weekday.key];
      const resolvedClassId = cell.isBlocked ? cell.inheritedClassId : cell.classId;
      const resolvedClass = resolvedClassId ? getClassById(resolvedClassId) : null;
      const resolvedRoom = cell.isBlocked ? cell.inheritedRoom : cell.room;

      if (row.type === "pause") {
        return '<td class="schedule-cell schedule-cell--pause"><span class="schedule-cell__note">Pause</span></td>';
      }

      if (cell.isBlocked) {
        return [
          '<td class="schedule-cell schedule-cell--blocked">',
          '<div class="schedule-cell__stack">',
          '<span class="schedule-cell__blocked-label">Doppelstunde</span>',
          '<span class="schedule-cell__blocked-value">', escapeValue(resolvedClass ? getClassDisplayName(resolvedClass) : "Fortsetzung"), "</span>",
          '<span class="schedule-cell__blocked-room">', escapeValue(resolvedRoom || "Raum offen"), "</span>",
          "</div>",
          "</td>"
        ].join("");
      }

      return [
        '<td class="schedule-cell">',
        '<div class="schedule-cell__stack">',
        '<select class="student-table__input student-table__select" onchange="return window.UnterrichtsassistentApp.updateTimetableClass(\'', row.id, '\', \'', weekday.key, '\', this.value)">',
        renderClassOptions(cell.classId),
        "</select>",
        '<input class="student-table__input" type="text" placeholder="Raum" value="', escapeValue(cell.room), '" autocomplete="off" autocapitalize="none" spellcheck="false" onchange="return window.UnterrichtsassistentApp.updateTimetableRoom(\'', row.id, '\', \'', weekday.key, '\', this.value)">',
        '<label class="schedule-double-toggle">',
        '<input type="checkbox" ', cell.isDouble ? "checked " : "", cell.classId ? "" : "disabled ", 'onchange="return window.UnterrichtsassistentApp.toggleTimetableDouble(\'', row.id, '\', \'', weekday.key, '\', this.checked)">',
        "<span>Doppelstunde</span>",
        "</label>",
        "</div>",
        "</td>"
      ].join("");
    }

    function renderCompactDayCell(lessonRows, row, rowIndex, weekday) {
      const timeContext = renderCompactDayCell.timeContext;
      const cell = row.cells[weekday.key];
      const resolvedClassId = cell.isBlocked ? cell.inheritedClassId : cell.classId;
      const resolvedClass = resolvedClassId ? getClassById(resolvedClassId) : null;
      const resolvedRoom = cell.isBlocked ? cell.inheritedRoom : cell.room;
      const rowspan = countCellRowspan(lessonRows, rowIndex, weekday.key);
      const boxStyle = rowspan > 1 ? "min-height:" + String((rowspan * 84) - 4) + "px;" : "";
      const isCurrentDay = timeContext.currentWeekdayKey === weekday.key;
      const currentDayClass = isCurrentDay ? " is-current-day" : "";
      const pastDayClass = timeContext.pastWeekdayKeys[weekday.key] ? " is-past-day" : "";
      const pastRowClass = isCurrentDay && timeContext.pastLessonRowIds[row.id] ? " is-past-slot" : "";
      const currentCellClass = currentDayClass + pastDayClass + pastRowClass;
      const timeBarHtml = timeContext.barSourceRowId === row.id && isCurrentDay
        ? '<span class="schedule-compact__time-bar" style="top:' + String(timeContext.barOffsetPercent) + '%"></span>'
        : "";
      const actionLabel = resolvedClass
        ? getClassDisplayName(resolvedClass) + ", " + weekday.shortLabel + " " + timeContext.weekDates[weekday.key].label + ", " + row.startTime
        : "";
      const actionAttributes = ' type="button" aria-label="' + escapeValue(actionLabel) + '" title="' + escapeValue(actionLabel) + '" onclick="return window.UnterrichtsassistentApp.setContextFromTimetableCell(\'' + escapeValue(resolvedClassId) + '\', \'' + escapeValue(timeContext.weekDates[weekday.key].isoDate) + '\', \'' + escapeValue(row.startTime) + '\', \'' + escapeValue(timetable ? timetable.id : "") + '\')"';

      if (cell.isBlocked) {
        return "";
      }

      if (!resolvedClass) {
        return '<td class="schedule-compact__lesson-cell schedule-compact__lesson-cell--empty' + currentCellClass + '"' + (rowspan > 1 ? ' rowspan="' + rowspan + '"' : "") + '><div class="schedule-compact__lesson-box schedule-compact__lesson-box--empty"></div>' + timeBarHtml + '</td>';
      }

      return [
        '<td class="schedule-compact__lesson-cell', currentCellClass, '"', rowspan > 1 ? ' rowspan="' + rowspan + '"' : "", ">",
        '<button class="schedule-compact__lesson-box', rowspan > 1 ? " is-double" : "", '"' + actionAttributes + ' style="', buildLessonBoxStyle(resolvedClass), " ", boxStyle, '">',
        '<div class="schedule-compact__lesson-title">', escapeValue(getClassDisplayName(resolvedClass)), "</div>",
        '<div class="schedule-compact__lesson-room">', escapeValue(resolvedRoom || "Raum offen"), "</div>",
        "</button>",
        timeBarHtml,
        "</td>"
      ].join("");
    }

    function renderManageTable() {
      const tableRows = rows.map(function (row) {
        return [
          "<tr>",
          '<td class="schedule-meta-cell">',
          '<div class="schedule-slot-card">',
          '<div class="schedule-slot-card__time">', escapeValue(row.startTime), " - ", escapeValue(row.endTime), "</div>",
          '<div class="schedule-slot-card__controls">',
          '<select class="student-table__input student-table__select" onchange="return window.UnterrichtsassistentApp.updateTimetableRowField(\'', row.id, '\', \'type\', this.value)">',
          '<option value="lesson"', row.type === "lesson" ? " selected" : "", ">Unterrichtsstunde</option>",
          '<option value="pause"', row.type === "pause" ? " selected" : "", ">Pause</option>",
          "</select>",
          '<select class="student-table__input student-table__select" onchange="return window.UnterrichtsassistentApp.updateTimetableRowField(\'', row.id, '\', \'durationMinutes\', this.value)">',
          [5, 10, 15, 20, 30, 45, 60, 90].map(function (duration) {
            return '<option value="' + duration + '"' + (row.durationMinutes === duration ? " selected" : "") + ">" + duration + " Minuten</option>";
          }).join(""),
          "</select>",
          "</div>",
          "</div>",
          "</td>",
          weekdays.map(function (weekday) {
            return renderManageDayCell(row, weekday);
          }).join(""),
          "</tr>"
        ].join("");
      }).join("");

      return [
        '<div class="schedule-toolbar">',
        '<label class="schedule-toolbar__field">',
        "<span>Gueltig ab</span>",
        '<input class="student-table__input schedule-toolbar__time" type="date" value="', escapeValue(formatDateValue(timetable.validFrom)), '" onchange="return window.UnterrichtsassistentApp.updateTimetableDateField(\'validFrom\', this.value)">',
        "</label>",
        '<label class="schedule-toolbar__field">',
        "<span>Gueltig bis</span>",
        '<input class="student-table__input schedule-toolbar__time" type="date" value="', escapeValue(formatDateValue(timetable.validTo)), '" onchange="return window.UnterrichtsassistentApp.updateTimetableDateField(\'validTo\', this.value)">',
        "</label>",
        '<label class="schedule-toolbar__field">',
        "<span>Unterrichtsbeginn</span>",
        '<input class="student-table__input schedule-toolbar__time" type="time" value="', escapeValue(timetable.startTime), '" onchange="return window.UnterrichtsassistentApp.updateTimetableStartTime(this.value)">',
        "</label>",
        "</div>",
        '<div class="student-table-wrap schedule-table-wrap">',
        '<table class="student-table schedule-table">',
        "<thead><tr><th>Zeitfenster</th>",
        weekdays.map(function (weekday) {
          return "<th>" + escapeValue(weekday.label) + "</th>";
        }).join(""),
        "</tr></thead>",
        "<tbody>",
        tableRows || '<tr><td colspan="6">Noch kein Zeitraster vorhanden. Lege unten die erste Zeile an.</td></tr>',
        "</tbody>",
        "</table>",
        "</div>",
        '<div class="table-actions schedule-table-actions"><button class="import-box__label" type="button" onclick="return window.UnterrichtsassistentApp.addTimetableRow()">Neue Zeile</button></div>'
      ].join("");
    }

    function renderCompactTable() {
      const weekDates = getWeekDates();
      const lessonRows = rows.filter(function (row) {
        return row.type === "lesson";
      });
      const now = new Date(referenceDate);
      const currentWeekdayIndex = now.getDay() === 0 ? 7 : now.getDay();
      const currentWeekdayKey = currentWeekdayIndex >= 1 && currentWeekdayIndex <= 5 ? String(currentWeekdayIndex) : "";
      const currentMinutes = (now.getHours() * 60) + now.getMinutes();
      const pastWeekdayKeys = {};
      const pastLessonRowIds = {};
      let barSourceRowId = "";
      let barOffsetPercent = -1;

      weekdays.forEach(function (weekday) {
        if (currentWeekdayIndex > 5 || Number(weekday.key) < currentWeekdayIndex) {
          pastWeekdayKeys[weekday.key] = true;
        }
      });

      lessonRows.forEach(function (row) {
        if (currentWeekdayKey && timeToMinutes(row.endTime) < currentMinutes) {
          pastLessonRowIds[row.id] = true;
        }
      });

      if (currentWeekdayKey && lessonRows.length) {
        const firstLessonStart = timeToMinutes(lessonRows[0].startTime);
        const lastLessonEnd = timeToMinutes(lessonRows[lessonRows.length - 1].endTime);

        if (currentMinutes >= firstLessonStart && currentMinutes <= lastLessonEnd) {
          lessonRows.some(function (row, rowIndex) {
            const startMinutes = timeToMinutes(row.startTime);
            const endMinutes = timeToMinutes(row.endTime);
            const nextRow = lessonRows[rowIndex + 1] || null;
            const nextStartMinutes = nextRow ? timeToMinutes(nextRow.startTime) : null;
            const sourceRowId = row.cells[currentWeekdayKey].sourceRowId || row.id;
            const sourceRowIndex = lessonRows.findIndex(function (candidate) {
              return candidate.id === sourceRowId;
            });
            const span = sourceRowIndex >= 0 ? countCellRowspan(lessonRows, sourceRowIndex, currentWeekdayKey) : 1;

            if (currentMinutes >= startMinutes && currentMinutes <= endMinutes) {
              barSourceRowId = sourceRowId;
              barOffsetPercent = Math.max(0, Math.min(100, (((rowIndex - sourceRowIndex) + ((currentMinutes - startMinutes) / Math.max(endMinutes - startMinutes, 1))) / Math.max(span, 1)) * 100));
              return true;
            }

            if (nextRow && currentMinutes > endMinutes && currentMinutes < nextStartMinutes) {
              barSourceRowId = sourceRowId;
              barOffsetPercent = Math.max(0, Math.min(100, (((rowIndex - sourceRowIndex) + 1) / Math.max(span, 1)) * 100));
              return true;
            }

            return false;
          });
        }
      }

      renderCompactDayCell.timeContext = {
        currentWeekdayKey: currentWeekdayKey,
        pastWeekdayKeys: pastWeekdayKeys,
        pastLessonRowIds: pastLessonRowIds,
        barSourceRowId: barSourceRowId,
        barOffsetPercent: barOffsetPercent,
        weekDates: weekDates
      };

      const compactRows = lessonRows.map(function (row, rowIndex) {
        const lessonLabel = String(rowIndex + 1) + ". Stunde";
        const rowPastClass = pastLessonRowIds[row.id] ? " is-past-slot" : "";

        return [
          '<tr class="schedule-compact__row', rowPastClass, '">',
          '<td class="schedule-compact__index-cell', rowPastClass, '">',
          '<span class="schedule-compact__start-time">' + escapeValue(row.startTime) + "</span>",
          lessonLabel ? '<span class="schedule-compact__lesson-index">' + lessonLabel + "</span>" : "",
          '<span class="schedule-compact__boundary-time">' + escapeValue(row.endTime) + "</span>",
          "</td>",
          weekdays.map(function (weekday) {
            return renderCompactDayCell(lessonRows, row, rowIndex, weekday);
          }).join(""),
          "</tr>"
        ].join("");
      }).join("");

      return [
        '<div class="student-table-wrap schedule-table-wrap schedule-table-wrap--compact">',
        '<table class="schedule-compact-table">',
        "<thead><tr><th></th>",
        weekdays.map(function (weekday) {
          const headerClasses = [
            currentWeekdayKey === weekday.key ? "is-current-day" : "",
            pastWeekdayKeys[weekday.key] ? "is-past-day" : ""
          ].join(" ").trim();
          const previousWeekButton = weekday.key === "1"
            ? '<button class="schedule-compact__week-nav schedule-compact__week-nav--prev" type="button" aria-label="Eine Woche zurueck" onclick="return window.UnterrichtsassistentApp.shiftActiveDateByDays(-7)">&lsaquo;</button>'
            : "";
          const nextWeekButton = weekday.key === "5"
            ? '<button class="schedule-compact__week-nav schedule-compact__week-nav--next" type="button" aria-label="Eine Woche weiter" onclick="return window.UnterrichtsassistentApp.shiftActiveDateByDays(7)">&rsaquo;</button>'
            : "";

          return '<th class="' + headerClasses + '"><div class="schedule-compact__weekday-header">' + previousWeekButton + '<span class="schedule-compact__weekday-wrap"><span class="schedule-compact__weekday">' + escapeValue(weekday.shortLabel) + '</span><span class="schedule-compact__weekday-date">' + escapeValue(weekDates[weekday.key].label) + '</span></span>' + nextWeekButton + "</div></th>";
        }).join(""),
        "</tr></thead>",
        "<tbody>",
        compactRows,
        "</tbody>",
        "</table>",
        "</div>"
      ].join("");
    }

    return [
      '<div class="panel-grid panel-grid--klasse">',
      '<article class="panel panel--full">',
      timetable ? (isManageMode ? renderManageTable() : (rows.length ? renderCompactTable() : '<p class="empty-message">Fuer den aktuell gueltigen Stundenplan ist noch kein Zeitraster hinterlegt.</p>')) : '<p class="empty-message">Noch kein Stundenplan vorhanden. Lege im Modus Verwalten ueber den Plus-Button den ersten Stundenplan an.</p>',
      "</article>",
      "</div>"
    ].join("");
  }
};


/* --- src\ui\views\sitzplanView.js --- */
window.Unterrichtsassistent = window.Unterrichtsassistent || {};
window.Unterrichtsassistent.ui = window.Unterrichtsassistent.ui || {};
window.Unterrichtsassistent.ui.views = window.Unterrichtsassistent.ui.views || {};

window.Unterrichtsassistent.ui.views.sitzplan = {
  id: "sitzplan",
  title: "Sitzplan",
  render: function (service) {
    const activeClass = service.getActiveClass();
    const students = activeClass ? service.getStudentsForClass(activeClass.id) : [];
    const seatPlanViewMode = window.UnterrichtsassistentApp && typeof window.UnterrichtsassistentApp.getSeatPlanViewMode === "function"
      ? window.UnterrichtsassistentApp.getSeatPlanViewMode()
      : "ansicht";
    const seatPlanDeskToolMode = window.UnterrichtsassistentApp && typeof window.UnterrichtsassistentApp.getSeatPlanDeskToolMode === "function"
      ? window.UnterrichtsassistentApp.getSeatPlanDeskToolMode()
      : "move";
    const seatPlanMoveLinkMode = window.UnterrichtsassistentApp && typeof window.UnterrichtsassistentApp.isSeatPlanMoveLinkMode === "function"
      ? window.UnterrichtsassistentApp.isSeatPlanMoveLinkMode()
      : true;
    const hiddenDeskLayoutItemIds = window.UnterrichtsassistentApp && typeof window.UnterrichtsassistentApp.getActiveDeskLayoutHiddenItemIds === "function"
      ? window.UnterrichtsassistentApp.getActiveDeskLayoutHiddenItemIds()
      : [];
    const seatPlanRotateMode = window.UnterrichtsassistentApp && typeof window.UnterrichtsassistentApp.getSeatPlanRotateMode === "function"
      ? window.UnterrichtsassistentApp.getSeatPlanRotateMode()
      : "90";
    const seatPlanMirrorMode = window.UnterrichtsassistentApp && typeof window.UnterrichtsassistentApp.getSeatPlanMirrorMode === "function"
      ? window.UnterrichtsassistentApp.getSeatPlanMirrorMode()
      : "horizontal";
    const availableRooms = activeClass ? service.getRoomsForClass(activeClass.id) : [];
    const selectedRoom = activeClass ? String(service.snapshot.activeSeatPlanRoom || "").trim() : "";
    const liveRoom = activeClass && String(service.snapshot.activeDateTimeMode || "live") === "live" && typeof service.getLiveRoomForClass === "function"
      ? service.getLiveRoomForClass(activeClass.id, service.getReferenceDate())
      : "";
    const activeRoom = activeClass
      ? ((liveRoom && (!availableRooms.length || availableRooms.indexOf(liveRoom) >= 0))
        ? liveRoom
        : ((selectedRoom && (!availableRooms.length || availableRooms.indexOf(selectedRoom) >= 0))
        ? selectedRoom
        : (service.getRelevantRoomForClass(activeClass.id, service.getReferenceDate()) || availableRooms[0] || "")))
      : "";
    const currentSeatPlan = activeClass
      ? service.getCurrentSeatPlan(activeClass.id, activeRoom, service.getReferenceDate())
      : null;
    const managedSeatPlan = activeClass
      ? service.getManagedSeatPlan(activeClass.id, activeRoom)
      : null;
    const currentSeatOrder = activeClass && typeof service.getCurrentSeatOrder === "function"
      ? service.getCurrentSeatOrder(activeClass.id, activeRoom, service.getReferenceDate())
      : null;
    const managedSeatOrder = activeClass && typeof service.getManagedSeatOrder === "function"
      ? service.getManagedSeatOrder(activeClass.id, activeRoom)
      : null;
    const seatOrder = activeClass
      ? (seatPlanViewMode === "sitzordnung" ? managedSeatOrder : currentSeatOrder)
      : null;
    const seatOrderReferenceDate = seatOrder && seatOrder.validFrom
      ? new Date(String(seatOrder.validFrom) + "T12:00:00")
      : service.getReferenceDate();
    const seatPlan = activeClass
      ? (seatPlanViewMode === "tischordnung"
        ? managedSeatPlan
        : service.getCurrentSeatPlan(activeClass.id, activeRoom, seatOrderReferenceDate))
      : null;
    const deskLayoutItems = seatPlan && Array.isArray(seatPlan.deskLayoutItems) ? seatPlan.deskLayoutItems : [];
    const deskLayoutLinks = seatPlan && Array.isArray(seatPlan.deskLayoutLinks) ? seatPlan.deskLayoutLinks : [];
    const seatAssignments = seatOrder && Array.isArray(seatOrder.seats) ? seatOrder.seats : [];
    const assignedStudentIds = seatAssignments.filter(function (seat) {
      return seat && seat.studentId;
    }).map(function (seat) {
      return seat.studentId;
    });
    const unassignedStudents = students.filter(function (student) {
      return assignedStudentIds.indexOf(student.id) === -1;
    });
    const roomWindowSide = seatPlan && typeof seatPlan.roomWindowSide === "string" ? seatPlan.roomWindowSide : "";
    const roomWidth = seatPlan && Number(seatPlan.roomWidth) ? Number(seatPlan.roomWidth) : 720;
    const roomHeight = seatPlan && Number(seatPlan.roomHeight) ? Number(seatPlan.roomHeight) : 720;

    function escapeValue(value) {
      return String(value || "")
        .replace(/&/g, "&amp;")
        .replace(/\\/g, "&#92;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#39;")
        .replace(/`/g, "&#96;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/\r/g, "&#13;")
        .replace(/\n/g, "&#10;");
    }

    function formatDateValue(dateValue) {
      return String(dateValue || "").slice(0, 10);
    }

    function getStudentShortLabel(student) {
      const firstName = String(student && student.firstName || "").trim();
      const lastName = String(student && student.lastName || "").trim();
      const lastInitial = lastName ? lastName.charAt(0).toUpperCase() + "." : "";

      return [firstName, lastInitial].join(" ").trim();
    }

    function getSeatAssignmentByDeskSlot(deskItemId, slotName) {
      return seatAssignments.find(function (seat) {
        return seat.deskItemId === deskItemId && seat.slot === slotName;
      }) || null;
    }

    function getStudentById(studentId) {
      return students.find(function (student) {
        return student.id === studentId;
      }) || null;
    }

    function getDeskItemMetrics(item) {
      const itemType = item && item.type === "tafel"
        ? "tafel"
        : (item && item.type === "pult"
          ? "pult"
          : (item && item.type === "double" ? "double" : "single"));

      return {
        type: itemType,
        width: Number(item && item.width) || (itemType === "tafel" ? 320 : ((itemType === "double" || itemType === "pult") ? 156 : 88)),
        height: Number(item && item.height) || (itemType === "tafel" ? 28 : 88)
      };
    }

    function getDeskItemCenter(item, offsetX, offsetY) {
      const metrics = getDeskItemMetrics(item);

      return {
        x: (Number(item && item.x) || 0) - (Number(offsetX) || 0) + (metrics.width / 2),
        y: (Number(item && item.y) || 0) - (Number(offsetY) || 0) + (metrics.height / 2)
      };
    }

    function getSeatOrderReferenceTarget(item, offsetX, offsetY, canvasWidth, canvasHeight) {
      const targetItem = deskLayoutItems.find(function (candidate) {
        return candidate && candidate.type === "tafel";
      }) || deskLayoutItems.find(function (candidate) {
        return candidate && candidate.type === "pult";
      });
      const deskCenter = getDeskItemCenter(item, offsetX, offsetY);

      if (targetItem) {
        return getDeskItemCenter(targetItem, offsetX, offsetY);
      }

      return {
        x: deskCenter.x,
        y: Number(canvasHeight) || 0
      };
    }

    function getDoubleDeskSlotLayout(item, offsetX, offsetY, canvasWidth, canvasHeight) {
      const metrics = getDeskItemMetrics(item);
      const deskCenter = getDeskItemCenter(item, offsetX, offsetY);
      const targetPoint = getSeatOrderReferenceTarget(item, offsetX, offsetY, canvasWidth, canvasHeight);
      let facingX = (Number(targetPoint.x) || 0) - deskCenter.x;
      let facingY = (Number(targetPoint.y) || 0) - deskCenter.y;
      const longAxis = metrics.width >= metrics.height ? "horizontal" : "vertical";
      const leftVectorFallback = longAxis === "horizontal"
        ? { x: -1, y: 0 }
        : { x: 0, y: -1 };
      let leftVector;
      let orderedSlots;

      if (!facingX && !facingY) {
        facingY = 1;
      }

      leftVector = {
        x: facingY || leftVectorFallback.x,
        y: -facingX || leftVectorFallback.y
      };

      if (longAxis === "horizontal") {
        orderedSlots = leftVector.x <= 0 ? ["left", "right"] : ["right", "left"];
      } else {
        orderedSlots = leftVector.y <= 0 ? ["left", "right"] : ["right", "left"];
      }

      return {
        axis: longAxis,
        orderedSlots: orderedSlots
      };
    }

        }

        if (itemType === "single" || itemType === "double") {
          const doubleDeskLayout = itemType === "double"
            ? getDoubleDeskSlotLayout(item, offsetX, offsetY, canvasWidth, canvasHeight)
            : null;
          const slotGridClass = itemType === "double"
            ? "seat-order-slot-grid seat-order-slot-grid--double seat-order-slot-grid--double-" + doubleDeskLayout.axis
            : "seat-order-slot-grid";
          const doubleSlotsHtml = itemType === "double"
            ? doubleDeskLayout.orderedSlots.map(function (slotName, slotIndex) {
                const assignment = slotName === "left" ? leftAssignment : rightAssignment;
                const slotLabel = slotName === "left" ? "Links" : "Rechts";
                const positionClass = doubleDeskLayout.axis === "horizontal"
                  ? (slotIndex === 0 ? "visual-left" : "visual-right")
                  : (slotIndex === 0 ? "visual-top" : "visual-bottom");

                return renderSeatSlot(slotName, assignment, slotLabel, "seat-order-slot--" + positionClass);
              }).join("")
            : "";

          return '<div class="desk-layout-item desk-layout-item--' + itemType + ' desk-layout-item--seat-order" style="' + inlineStyle + '" aria-label="Sitzplaetze dieses Tisches">' + (
            itemType === "double"
              ? '<div class="' + slotGridClass + '">' + doubleSlotsHtml + "</div>"
              : '<div class="seat-order-slot-grid">' + renderSeatSlot("single", singleAssignment, "Platz") + "</div>"
          ) + '</div>';
        }

        return '<div class="desk-layout-item desk-layout-item--' + itemType + ' desk-layout-item--static" style="' + inlineStyle + '" aria-hidden="true"></div>';
      }).join("");

    function getDeskBounds() {

        return {

    function getItemById(itemId) {
      return deskLayoutItems.find(function (item) {
        return item.id === itemId;
      }) || null;
    }

    function getDeskLayoutGroups() {
      const visited = {};

      return deskLayoutItems.map(function (item) {
        if (visited[item.id]) {
          return null;
        }

        const pending = [item.id];
        const groupIds = [];

        while (pending.length) {
          const currentId = pending.shift();

          if (!currentId || visited[currentId]) {
            continue;
          }

          visited[currentId] = true;
          groupIds.push(currentId);
          deskLayoutLinks.forEach(function (link) {
            if (link.itemAId === currentId && !visited[link.itemBId]) {
              pending.push(link.itemBId);
            } else if (link.itemBId === currentId && !visited[link.itemAId]) {
              pending.push(link.itemAId);
            }
          });
        }

        return groupIds;
      }).filter(function (groupIds) {
        return Array.isArray(groupIds) && groupIds.length > 1;
      }).map(function (groupIds) {
        return groupIds.map(function (groupItemId) {
          return getItemById(groupItemId);
        }).filter(Boolean);
      });
    }

    function buildDeskLayoutGroupOutlinePath(rects, step) {
      const occupied = {};
      const directedEdges = [];
      const edgeMap = {};
      const outgoing = {};

      function addEdge(x1, y1, x2, y2) {
        const edge = {
          start: String(x1) + "," + String(y1),
          end: String(x2) + "," + String(y2)
        };

        directedEdges.push(edge);
      }

      function setOccupiedCell(col, row) {
        occupied[String(col) + "," + String(row)] = true;
      }

      function isOccupiedCell(col, row) {
        return Boolean(occupied[String(col) + "," + String(row)]);
      }

      function consumeEdge(currentKey) {
        const nextEdges = outgoing[currentKey] || [];

        while (nextEdges.length) {
          const nextEdge = nextEdges.shift();

          if (!edgeMap[nextEdge.id]) {
            continue;
          }

          delete edgeMap[nextEdge.id];
          return nextEdge;
        }

        return null;
      }

      (rects || []).forEach(function (rect) {
        const startCol = Math.floor((Number(rect.x) || 0) / step);
        const endCol = Math.ceil(((Number(rect.x) || 0) + (Number(rect.width) || 0)) / step);
        const startRow = Math.floor((Number(rect.y) || 0) / step);
        const endRow = Math.ceil(((Number(rect.y) || 0) + (Number(rect.height) || 0)) / step);
        let col;
        let row;

        for (col = startCol; col < endCol; col += 1) {
          for (row = startRow; row < endRow; row += 1) {
            setOccupiedCell(col, row);
          }
        }
      });

      Object.keys(occupied).forEach(function (cellKey) {
        const parts = cellKey.split(",");
        const col = Number(parts[0]) || 0;
        const row = Number(parts[1]) || 0;
        const x = col * step;
        const y = row * step;

        if (!isOccupiedCell(col, row - 1)) {
          addEdge(x, y, x + step, y);
        }

        if (!isOccupiedCell(col + 1, row)) {
          addEdge(x + step, y, x + step, y + step);
        }

        if (!isOccupiedCell(col, row + 1)) {
          addEdge(x + step, y + step, x, y + step);
        }

        if (!isOccupiedCell(col - 1, row)) {
          addEdge(x, y + step, x, y);
        }
      });

      directedEdges.forEach(function (edge, index) {
        const storedEdge = {
          id: "edge-" + String(index),
          start: edge.start,
          end: edge.end
        };

        edgeMap[storedEdge.id] = storedEdge;
        outgoing[storedEdge.start] = outgoing[storedEdge.start] || [];
        outgoing[storedEdge.start].push(storedEdge);
      });

      return Object.keys(edgeMap).reduce(function (allPaths, edgeId) {
        const firstEdge = edgeMap[edgeId];
        const points = [];
        let currentEdge;
        let currentPoint;

        if (!firstEdge) {
          return allPaths;
        }

        delete edgeMap[edgeId];
        points.push(firstEdge.start, firstEdge.end);
        currentPoint = firstEdge.end;

        while (currentPoint !== firstEdge.start) {
          currentEdge = consumeEdge(currentPoint);

          if (!currentEdge) {
            break;
          }

          points.push(currentEdge.end);
          currentPoint = currentEdge.end;
        }

        if (points.length >= 3) {
          allPaths.push(points);
        }

        return allPaths;
      }, []).map(function (points) {
        return points.reduce(function (pathText, pointKey, index) {
          const coords = pointKey.split(",");
          const x = Number(coords[0]) || 0;
          const y = Number(coords[1]) || 0;

          return pathText + (index === 0 ? "M" : "L") + String(x) + " " + String(y) + " ";
        }, "") + "Z";
      }).join(" ");
    }

    function renderDeskLayoutGroups() {
      return getDeskLayoutGroups().map(function (groupItems) {
        const visibleItems = groupItems.filter(function (item) {
          return hiddenDeskLayoutItemIds.indexOf(item.id) === -1;
        });
        let minX;
        let minY;
        let maxRight;
        let maxBottom;
        const padding = 12;
        const step = 4;
        let outlinePath;
        let rects;

        if (visibleItems.length < 2) {
          return "";
        }

        minX = Math.min.apply(null, visibleItems.map(function (item) { return Number(item.x) || 0; }));
        minY = Math.min.apply(null, visibleItems.map(function (item) { return Number(item.y) || 0; }));
        maxRight = Math.max.apply(null, visibleItems.map(function (item) {
          return (Number(item.x) || 0) + (Number(item.width) || (item.type === "tafel" ? 320 : ((item.type === "double" || item.type === "pult") ? 156 : 88)));
        }));
        maxBottom = Math.max.apply(null, visibleItems.map(function (item) {
          return (Number(item.y) || 0) + (Number(item.height) || (item.type === "tafel" ? 28 : 88));
        }));
        rects = visibleItems.map(function (item) {
          return {
            x: (Number(item.x) || 0) - minX,
            y: (Number(item.y) || 0) - minY,
            width: (Number(item.width) || (item.type === "tafel" ? 320 : ((item.type === "double" || item.type === "pult") ? 156 : 88))) + (padding * 2),
            height: (Number(item.height) || (item.type === "tafel" ? 28 : 88)) + (padding * 2)
          };
        });
        outlinePath = buildDeskLayoutGroupOutlinePath(rects, step);

        return [
          '<svg class="desk-layout-group-outline" aria-hidden="true" style="',
          [
            "left:" + String(minX - padding) + "px",
            "top:" + String(minY - padding) + "px",
            "width:" + String(maxRight - minX + (padding * 2)) + "px",
            "height:" + String(maxBottom - minY + (padding * 2)) + "px"
          ].join(";"),
          '" viewBox="0 0 ',
          String(maxRight - minX + (padding * 2)),
          " ",
          String(maxBottom - minY + (padding * 2)),
          '" preserveAspectRatio="none">',
          '<path class="desk-layout-group-outline__path" d="',
          escapeValue(outlinePath),
          '"></path>',
          '</svg>'
        ].join("");
      }).join("");
    }

    function renderDeskLayoutLinks() {
      return deskLayoutLinks.map(function (link) {
        const itemA = getItemById(link.itemAId);
        const itemB = getItemById(link.itemBId);
        const isHorizontal = link.sideA === "left" || link.sideA === "right";
        let style = "";
        let overlapStart;
        let overlapEnd;
        let anchorX;
        let anchorY;

        if (!itemA || !itemB) {
          return "";
        }

        if (hiddenDeskLayoutItemIds.indexOf(itemA.id) >= 0 || hiddenDeskLayoutItemIds.indexOf(itemB.id) >= 0) {
          return "";
        }

        if (isHorizontal) {
          overlapStart = Math.max(Number(itemA.y) || 0, Number(itemB.y) || 0);
          overlapEnd = Math.min((Number(itemA.y) || 0) + (Number(itemA.height) || 88), (Number(itemB.y) || 0) + (Number(itemB.height) || 88));
          anchorX = link.sideA === "right"
            ? (Number(itemA.x) || 0) + (Number(itemA.width) || 88)
            : (Number(itemA.x) || 0);

          if (overlapEnd - overlapStart < 12) {
            return "";
          }

          style = [
            "left:" + String(anchorX - 7) + "px",
            "top:" + String(overlapStart + 6) + "px",
            "width:14px",
            "height:" + String(Math.max(overlapEnd - overlapStart - 12, 12)) + "px"
          ].join(";");
        } else {
          overlapStart = Math.max(Number(itemA.x) || 0, Number(itemB.x) || 0);
          overlapEnd = Math.min((Number(itemA.x) || 0) + (Number(itemA.width) || 88), (Number(itemB.x) || 0) + (Number(itemB.width) || 88));
          anchorY = link.sideA === "bottom"
            ? (Number(itemA.y) || 0) + (Number(itemA.height) || 88)
            : (Number(itemA.y) || 0);

          if (overlapEnd - overlapStart < 12) {
            return "";
          }

          style = [
            "left:" + String(overlapStart + 6) + "px",
            "top:" + String(anchorY - 7) + "px",
            "width:" + String(Math.max(overlapEnd - overlapStart - 12, 12)) + "px",
            "height:14px"
          ].join(";");
        }

        return '<button class="desk-layout-link-edge desk-layout-link-edge--' + (isHorizontal ? "vertical" : "horizontal") + '" type="button" style="' + style + '" onclick="return window.UnterrichtsassistentApp.removeDeskLayoutLink(\'' + escapeValue(link.id) + '\')" aria-label="Link zwischen zwei Tischen trennen"></button>';
      }).join("");
    }
